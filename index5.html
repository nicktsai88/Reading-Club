<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎒 邁向5A10+ 國中會考讀書會 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(#ffcdd2 2px, transparent 2px),
                radial-gradient(#b2ebf2 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #4a4a4a;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 3px solid #ffe4e6;
            box-shadow: 0 8px 32px rgba(255, 192, 203, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(253, 164, 175, 0.6); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(253, 164, 175, 1); }

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        
        .chat-bubble-me { background: #e0f2fe; border-radius: 1rem 1rem 0 1rem; }
        .chat-bubble-other { background: #fce7f3; border-radius: 1rem 1rem 1rem 0; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  系統設定與常數
        // ==========================================
        const BASE_FIREBASE_CONFIG = {
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'study-group-app';
        
        const EXAM_DATE = new Date('2027-05-22T00:00:00');
        const SUBJECTS = ['國文', '英文', '數學', '自然', '社會'];
        const SUB_SUBJECTS = {
            '自然': ['自然合科', '生物', '理化', '地科'],
            '社會': ['社會合科', '歷史', '地理', '公民']
        };
        const GRADES = ['A++', 'A+', 'A', 'B++', 'B+', 'B', 'C'];

        // 資料狀態
        let appInstance, auth, db;
        let currentUser = null;
        let username = '';
        let viewingUser = ''; // 目前查看月曆的使用者
        let isAdmin = false;
        
        let globalUsers = [];
        let importantDates = [];
        let allGrades = {}; 
        let chatMessages = [];
        let modalState = { date: '', mainSubject: '', subSubject: '', grade: '', photoBase64: '' };
        
        // 月曆檢視狀態
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0-11
        
        let unsubUsers, unsubDates, unsubGrades, unsubChat;

        // ==========================================
        //  輔助工具函式
        // ==========================================
        const getDaysLeft = (targetDateStr) => {
            const now = new Date();
            now.setHours(0,0,0,0);
            const target = new Date(targetDateStr);
            target.setHours(0,0,0,0);
            const diffTime = target - now;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const getStoredConfig = () => {
            const stored = localStorage.getItem('study_group_firebase_config');
            if (stored) {
                try { return JSON.parse(stored); } catch(e) {}
            }
            if (typeof __firebase_config !== 'undefined') {
                try { return JSON.parse(__firebase_config); } catch(e) {}
            }
            return null;
        };

        // ==========================================
        //  UI 渲染函式 - 系統框架與登入
        // ==========================================
        window.renderApp = () => { 
            document.getElementById('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative overflow-hidden bg-white/20"></div>`; 
        };

        window.renderSetup = () => {
            const container = document.getElementById('view-container');
            const currentConfig = getStoredConfig() || {};
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                    <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] border-4 border-teal-200 relative overflow-hidden">
                        <h1 class="text-2xl md:text-3xl font-black text-teal-600 mb-2 drop-shadow-sm text-center">
                            ⚙️ 系統資料庫設定
                        </h1>
                        <p class="text-sm text-gray-500 mb-6 text-center font-bold">請填入您的 Firebase API Key 以啟用雲端同步功能</p>
                        
                        <div class="space-y-3 bg-white/60 p-6 rounded-2xl border border-teal-100">
                            <div>
                                <label class="block text-xs font-bold text-teal-800 mb-1">API Key (必填) *</label>
                                <input type="text" id="cfg-apiKey" value="${currentConfig.apiKey || ''}" placeholder="AIzaSy..." class="w-full px-3 py-2 rounded-lg border border-teal-200 focus:outline-none focus:border-teal-400 text-sm font-mono">
                            </div>
                        </div>
                        
                        <div class="mt-6 flex gap-3 justify-center">
                            ${currentConfig.apiKey ? `<button onclick="renderLogin()" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100 transition-colors">取消</button>` : ''}
                            <button onclick="saveFirebaseConfig()" class="flex-1 bg-gradient-to-r from-teal-400 to-emerald-400 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:shadow-lg transition-all">
                                💾 儲存並啟動系統
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderLogin = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                    <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] text-center border-4 border-pink-200 relative overflow-hidden">
                        <div class="absolute top-4 left-4 text-4xl animate-bounce-slow">✨</div>
                        <div class="absolute bottom-4 right-4 text-4xl animate-bounce-slow" style="animation-delay: 1s;">🎓</div>
                        <button onclick="renderSetup()" class="absolute top-5 right-5 text-gray-400 hover:text-teal-600 transition-colors bg-white/50 p-2 rounded-full border border-gray-200 hover:bg-white" title="系統設定">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </button>
                        
                        <!-- 修改為直接載入實際圖片 -->
                        <div class="flex justify-center items-center gap-6 mb-8">
                            <div class="w-20 h-20 bg-white rounded-full p-1 shadow-md border-2 border-red-200 overflow-hidden flex justify-center items-center">
                                <img src="school1.jpg" alt="雄中" class="w-full h-full object-contain rounded-full">
                            </div>
                            <div class="text-3xl font-black text-pink-400">X</div>
                            <div class="w-20 h-20 bg-white rounded-full p-1 shadow-md border-2 border-red-200 overflow-hidden flex justify-center items-center">
                                <img src="school2.jpg" alt="雄女" class="w-full h-full object-contain rounded-full">
                            </div>
                        </div>

                        <h1 class="text-3xl md:text-4xl font-black text-rose-500 mb-3 drop-shadow-sm tracking-wide">🎒 邁向5A10+</h1>
                        <h2 class="text-xl font-bold text-teal-600 mb-8 bg-teal-50 inline-block px-6 py-2 rounded-full border border-teal-100">國中會考讀書會 💯</h2>
                        
                        <div class="bg-white/60 p-6 rounded-3xl border border-pink-100 mb-6">
                            <p class="text-sm text-rose-400 font-bold mb-3">👇 點擊你的名字快速登入 👇</p>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${globalUsers.length > 0 ? 
                                    globalUsers.map(u => `<button onclick="handleLogin('${u}')" class="text-md font-bold bg-white border-2 border-rose-200 text-rose-600 hover:bg-rose-50 hover:scale-105 px-5 py-2.5 rounded-xl shadow-sm transition-all">👦 ${u}</button>`).join('') 
                                    : `<span class="text-sm text-gray-400">尚無參賽者，請於下方建立</span>`
                                }
                            </div>
                        </div>
                        
                        <div class="flex gap-2">
                            <input type="text" id="usernameInput" placeholder="✏️ 輸入新參賽者名稱" class="flex-1 px-5 py-3 text-lg rounded-xl border-2 border-teal-200 focus:outline-none focus:border-teal-400 text-center font-bold text-gray-700 placeholder-teal-300 shadow-inner" onkeypress="if(event.key === 'Enter') handleLogin(this.value)">
                            <button onclick="handleLogin(document.getElementById('usernameInput').value)" class="bg-gradient-to-r from-teal-400 to-emerald-400 text-white font-bold py-3 px-6 text-lg rounded-xl shadow-md hover:shadow-lg transition-all transform hover:scale-105">
                                加入 🔥
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <!-- 頂部導航 -->
                <div class="bg-white/80 backdrop-blur-md border-b-2 border-pink-200 p-3 flex justify-between items-center shadow-sm shrink-0 z-20 relative">
                    <div class="flex items-center gap-4 pl-2">
                        <!-- 修改為直接載入實際圖片 -->
                        <div class="flex -space-x-3">
                            <img src="school1.jpg" alt="雄中" class="w-10 h-10 object-contain rounded-full border-2 border-white shadow-sm z-10 bg-rose-50">
                            <img src="school2.jpg" alt="雄女" class="w-10 h-10 object-contain rounded-full border-2 border-white shadow-sm z-0 bg-rose-50">
                        </div>
                        <h1 class="text-xl md:text-2xl font-black text-rose-500 tracking-wider">邁向5A10+ 讀書會 🏆</h1>
                    </div>
                    <div class="flex items-center gap-3 pr-2">
                        <span class="font-bold text-teal-700 bg-teal-50 px-4 py-1.5 rounded-full border border-teal-200 shadow-sm text-sm hidden md:inline-block">
                            ${isAdmin ? '👑 管理員' : '👦 參賽者'} : ${username}
                        </span>
                        <button onclick="logout()" class="text-rose-500 hover:bg-rose-50 font-bold px-3 py-1.5 rounded-lg transition-colors text-sm border border-rose-200 bg-white shadow-sm">登出 👋</button>
                    </div>
                </div>

                <!-- 內容區: 三欄式設計 (左: 倒數/聊天, 中: 月曆儀表板, 右: 動態與排行榜) -->
                <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                    
                    <!-- 左側邊欄 (倒數 + 聊天室) -->
                    <div class="w-full md:w-72 lg:w-80 flex flex-col bg-white/50 border-b-2 md:border-b-0 md:border-r-2 border-pink-100 z-10 shrink-0 h-full min-h-0">
                        <div id="sidebar-countdowns" class="p-4 overflow-y-auto custom-scrollbar border-b-2 border-pink-100 shrink-0 max-h-[35%]"></div>
                        
                        <div class="flex-1 flex flex-col bg-white/60 overflow-hidden relative min-h-0">
                            <div class="bg-pink-100/50 p-2 text-center font-bold text-pink-600 border-b border-pink-100 text-sm shadow-sm shrink-0">💬 加油打氣留言板</div>
                            <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar text-sm relative min-h-0"></div>
                            
                            <div class="p-2 bg-white flex flex-col border-t border-pink-100 relative shrink-0">
                                <div id="emoji-picker" class="hidden absolute bottom-full left-2 mb-2 bg-white border border-pink-200 p-2 rounded-xl shadow-lg grid grid-cols-5 gap-2 z-50">
                                    ${['😀','😂','🥰','😎','🥺','💪','🔥','💯','📚','🎓','✨','🎉','📝','🏆','💖'].map(e => `<button onclick="insertEmoji('${e}')" class="text-xl hover:scale-125 transition-transform">${e}</button>`).join('')}
                                </div>
                                <div class="flex gap-2 items-center">
                                    <button id="emoji-toggle-btn" onclick="toggleEmojiPicker(event)" class="text-2xl hover:bg-pink-50 px-2 rounded-lg transition-colors">😀</button>
                                    <input type="text" id="chatInput" placeholder="說點什麼..." class="flex-1 px-3 py-2 rounded-lg border border-pink-200 focus:outline-none focus:border-pink-400 bg-gray-50" onkeypress="if(event.key === 'Enter') sendChat()">
                                    <button onclick="sendChat()" class="bg-pink-400 text-white px-3 py-2 rounded-lg font-bold hover:bg-pink-500 transition-colors shrink-0">送出</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 中間區塊 (個人/他人月曆儀表板) -->

                        <div class="flex justify-between items-center mb-4 bg-white/80 p-3 rounded-2xl border border-pink-100 shadow-sm shrink-0">
                            <button onclick="changeMonth(-1)" class="px-4 py-2 bg-pink-50 border border-pink-200 hover:bg-pink-100 text-pink-700 rounded-xl font-bold transition-colors shadow-sm">◀ 上個月</button>
                            <div class="flex flex-col items-center" id="calendar-header-container">
                                <!-- 內容由 renderCalendar 生成 -->
                            </div>
                            <button onclick="changeMonth(1)" class="px-4 py-2 bg-pink-50 border border-pink-200 hover:bg-pink-100 text-pink-700 rounded-xl font-bold transition-colors shadow-sm">下個月 ▶</button>
                        </div>
                        <!-- 網格容器 -->
                        <div id="calendar-grid" class="flex-1 flex flex-col min-h-0"></div>
                    </div>

                    <!-- 右側區塊 (戰況動態牆 + 排行榜) -->
                    <div class="w-full md:w-72 lg:w-80 flex flex-col bg-white/60 z-10 shrink-0 border-l-2 border-pink-100 min-h-0 h-full">
                        <!-- 上半部: 戰況動態牆 -->
                        <div class="flex-1 flex flex-col min-h-0 border-b-2 border-pink-100">
                            <div class="bg-gradient-to-r from-rose-100 to-pink-100 p-2 text-center font-bold text-rose-600 shadow-sm shrink-0 text-sm">🌟 最新戰況動態</div>
                            <div id="timeline-feed" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar"></div>
                        </div>
                        <!-- 下半部: 榮譽排行榜 -->
                        <div class="flex-1 flex flex-col min-h-0">
                            <div class="bg-gradient-to-r from-teal-100 to-emerald-100 p-2 text-center font-bold text-teal-700 shadow-sm shrink-0 text-sm">🏆 榮譽排行榜</div>
                            <div id="leaderboard-feed" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar bg-teal-50/30"></div>
                        </div>
                    </div>
                </div>

                <!-- 成績輸入 Modal -->
                <div id="score-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity duration-200 opacity-0">

                        <div class="bg-gradient-to-r from-teal-400 to-emerald-400 p-4 flex justify-between items-center text-white shrink-0">
                            <h2 class="text-xl font-bold flex items-center gap-2">📝 紀錄模擬成績 <span id="modal-date" class="bg-white/20 px-2 py-1 rounded text-sm font-mono"></span></h2>

                            <div>

                                <div class="grid grid-cols-5 gap-2" id="subject-selector">
                                    ${SUBJECTS.map(s => `<button onclick="selectSubject('${s}')" id="btn-sub-${s}" class="py-2 rounded-lg border-2 border-teal-200 text-teal-700 font-bold hover:bg-teal-50 transition-colors bg-white shadow-sm">${s}</button>`).join('')}
                                </div>
                            </div>
                            <!-- 次級科目區域 -->
                            <div id="sub-subject-container" class="hidden">
                                <label class="block text-blue-800 font-bold mb-2 text-sm">🔖 選擇細項</label>
                                <div class="grid grid-cols-4 gap-2" id="sub-subject-selector"></div>
                            </div>

                            <div>
                                <label class="block text-rose-800 font-bold mb-2">🎯 成績等級</label>
                                <div class="grid grid-cols-4 gap-2" id="grade-selector">
                                    ${GRADES.map(g => `<button onclick="selectGrade('${g}')" id="btn-grade-${g.replace('+','p').replace('+','p')}" class="py-2 rounded-lg border-2 border-rose-200 text-rose-700 font-bold hover:bg-rose-50 transition-colors bg-white shadow-sm">${g}</button>`).join('')}
                                </div>
                            </div>
                            <div>
                                <label class="block text-purple-800 font-bold mb-2">📸 拍下考卷/成績單 (選填)</label>
                                <div class="border-2 border-dashed border-purple-200 rounded-xl p-4 text-center bg-white hover:bg-purple-50 transition-colors cursor-pointer relative shadow-inner" onclick="document.getElementById('photo-upload').click()">
                                    <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                                    <div id="photo-preview-container" class="hidden flex-col items-center">
                                        <img id="photo-preview" class="h-32 object-contain rounded mb-2 shadow-sm border border-gray-200">
                                        <span class="text-xs text-purple-500 font-bold bg-purple-100 px-2 py-1 rounded">更換照片</span>
                                    </div>
                                    <div id="photo-placeholder" class="text-purple-400">
                                        <div class="text-3xl mb-1">📷</div>
                                        <span class="text-sm font-bold">點擊上傳或拍照</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 bg-white border-t border-gray-100 flex justify-end gap-3 shrink-0">
                            <button onclick="deleteGradeRecord()" id="btn-delete-grade" class="hidden px-5 py-2.5 rounded-xl font-bold text-red-500 bg-red-50 border border-red-200 hover:bg-red-100">刪除紀錄</button>
                            <div class="flex-1"></div>
                            <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100">取消</button>
                            <button onclick="saveGrade()" class="px-6 py-2.5 rounded-xl font-bold text-white bg-rose-400 hover:bg-rose-500 shadow-md">儲存 💾</button>
                        </div>
                    </div>
                </div>

                <!-- 查看他人成績 Modal -->
                <div id="view-score-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm hidden items-center justify-center z-[60] p-4 transition-opacity duration-200 opacity-0">
                    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border-4 border-teal-200 transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">
                        <div class="bg-gradient-to-r from-teal-400 to-emerald-400 p-4 flex justify-between items-center text-white shrink-0">
                            <h2 class="text-xl font-bold flex items-center gap-2">👀 查看成績 <span id="view-modal-date" class="bg-white/20 px-2 py-1 rounded text-sm font-mono"></span></h2>
                            <button onclick="closeViewModal()" class="hover:bg-white/20 rounded-full w-8 h-8 flex items-center justify-center font-bold">✕</button>
                        </div>
                        <div class="p-6 bg-teal-50/30 overflow-y-auto custom-scrollbar flex-1" id="view-score-content">
                            <!-- 動態內容生成 -->
                        </div>
                    </div>
                </div>
            `;
            if (username) {
                window.renderSidebar();
                window.renderMainContent();
                window.renderChat();
            }
        };

        // ==========================================
        //  UI 渲染函式 - 個別區塊
        // ==========================================
        window.renderSidebar = () => {
            const container = document.getElementById('sidebar-countdowns');
            if(!container) return;
            
            const examDaysLeft = getDaysLeft(EXAM_DATE);
            
            let html = `
                <div class="bg-gradient-to-br from-rose-400 to-pink-500 rounded-2xl p-5 text-center shadow-lg text-white mb-6 transform hover:scale-105 transition-transform border border-pink-300 shrink-0">

        window.renderChat = () => {
            const container = document.getElementById('chat-messages');

                            ${msg.text}

                    </div>
                `;

        };

        window.toggleEmojiPicker = (e) => {
            if(e) e.stopPropagation();
            const picker = document.getElementById('emoji-picker');
            picker.classList.toggle('hidden');
        };

        window.insertEmoji = (emoji) => {
            const input = document.getElementById('chatInput');
            input.value += emoji;
            input.focus();
            document.getElementById('emoji-picker').classList.add('hidden');

        window.changeMonth = (delta) => {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }

        window.changeViewingUser = (user) => {
            viewingUser = user;
            window.renderCalendar();
        };

        window.renderCalendar = () => {
            const container = document.getElementById('calendar-grid');
            const headerContainer = document.getElementById('calendar-header-container');
            if(!container || !headerContainer) return;

            headerContainer.innerHTML = `
                <h2 class="text-2xl font-black text-rose-500 tracking-wide">${currentYear} 年 ${currentMonth + 1} 月</h2>
                <select onchange="changeViewingUser(this.value)" class="text-sm font-bold text-teal-700 bg-teal-50 pl-4 pr-8 py-1.5 rounded-full mt-1 border border-teal-200 focus:outline-none focus:ring-2 focus:ring-teal-400 cursor-pointer shadow-sm">
                    ${globalUsers.map(u => `<option value="${u}" ${u === viewingUser ? 'selected' : ''}>👦 ${u} 的專屬進度</option>`).join('')}
                </select>
            `;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const startPad = firstDay === 0 ? 6 : firstDay - 1;

            let html = `<div class="grid grid-cols-7 gap-2 mb-2 shrink-0">`;
            ['一', '二', '三', '四', '五', '六', '日'].forEach((d, idx) => {
                const isWeekend = idx >= 5;
                html += `<div class="text-center font-bold ${isWeekend ? 'text-rose-500 bg-rose-50' : 'text-teal-700 bg-teal-50'} py-2 rounded-xl shadow-sm border border-gray-100">${d}</div>`;
            });
            
            // 加入 auto-rows-[120px] 固定每個格子的高度，超過即產生內部滾動條
            html += `</div><div class="grid grid-cols-7 gap-2 flex-1 auto-rows-[120px] overflow-y-auto custom-scrollbar pb-4 pr-1 pl-1">`;

            for(let i=0; i<startPad; i++) {
                html += `<div class="bg-white/30 rounded-2xl border border-transparent"></div>`;
            }

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === formatDate(new Date());
                const isImportant = importantDates.find(i => i.date === dateStr);
                const userGrades = allGrades[viewingUser]?.[dateStr];

                let cellContent = '';
                if (userGrades && Object.keys(userGrades).length > 0) {
                    cellContent = `<div class="flex flex-col gap-1.5 w-full mt-1 pb-1">`;
                    Object.entries(userGrades).forEach(([subKey, info]) => {
                        let isA = info.grade.includes('A');
                        let color = isA ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-teal-50 text-teal-700 border-teal-200';
                        
                        let shortName = subKey;
                        if(subKey === '自然合科') shortName = '自';
                        else if(subKey === '社會合科') shortName = '社';
                        else if(subKey === '地科' || subKey === '地球科學') shortName = '地科';
                        else if(subKey === '地理') shortName = '地理';
                        else shortName = subKey.charAt(0);

                        cellContent += `
                            <div class="text-[11px] font-bold ${color} border px-1.5 py-0.5 rounded flex items-center justify-between shadow-sm">
                                <span>${shortName} <span class="font-black">${info.grade}</span></span>
                                ${info.photo ? '<span class="text-[9px] text-purple-500">📸</span>' : ''}
                            </div>
                        `;
                    });
                    cellContent += `</div>`;
                }

                const headerClass = isToday 
                    ? 'bg-gradient-to-r from-teal-400 to-emerald-400 text-white shadow-md' 
                    : isImportant 
                        ? 'bg-gradient-to-r from-orange-400 to-rose-400 text-white shadow-md' 
                        : 'bg-pink-50 text-pink-700';

                // 點擊事件：若為自己，開啟編輯模式；若為他人，開啟展示模式
                const clickAction = viewingUser === username 
                    ? `openScoreModal('${dateStr}')` 
                    : `viewOthersScore('${viewingUser}', '${dateStr}')`;

                html += `
                    <div onclick="${clickAction}" class="bg-white border-2 border-pink-100 p-2 rounded-2xl shadow-sm flex flex-col transition-all cursor-pointer hover:border-teal-400 hover:shadow-md hover:-translate-y-1 overflow-hidden group">
                        <div class="flex justify-between items-start shrink-0 mb-1">
                            <span class="w-7 h-7 flex items-center justify-center rounded-full text-sm font-bold ${headerClass}">${d}</span>
                            ${isImportant ? `<span class="text-sm drop-shadow-sm group-hover:scale-125 transition-transform" title="${isImportant.title}">🔥</span>` : ''}
                        </div>
                        <div class="flex-1 overflow-y-auto custom-scrollbar">
                            ${cellContent}
                        </div>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        };

        window.renderTimeline = () => {
            const container = document.getElementById('timeline-feed');
            if(!container) return;

            const feed = [];
            Object.entries(allGrades).forEach(([u, dates]) => {
                Object.entries(dates).forEach(([d, subjects]) => {
                    Object.entries(subjects).forEach(([s, info]) => {
                        feed.push({ user: u, date: d, subject: s, ...info });
                    });
                });
            });

            feed.sort((a,b) => {
                const timeA = a.updatedAt ? new Date(a.updatedAt) : new Date(a.date);
                const timeB = b.updatedAt ? new Date(b.updatedAt) : new Date(b.date);
                return timeB - timeA;
            });

            if (feed.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-70">
                        <div class="text-4xl mb-2">🍃</div>
                        <div class="text-sm font-bold">尚無戰況紀錄，趕快搶頭香！</div>
                    </div>`;
                return;
            }

            let html = '';
            feed.forEach(item => {
                const isMe = item.user === username;
                const isA = item.grade.includes('A');
                const emoji = isA ? '🏆' : '💪';
                const borderColor = isA ? 'border-rose-300' : 'border-teal-200';
                const bgColor = isA ? 'bg-gradient-to-br from-white to-rose-50' : 'bg-gradient-to-br from-white to-teal-50';

                html += `
                    <div class="p-3 rounded-2xl border-2 ${borderColor} ${bgColor} shadow-sm relative group cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all" onclick="viewOthersScore('${item.user}', '${item.date}')">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-gray-700 bg-white px-2 py-0.5 rounded shadow-sm text-xs border border-gray-100">
                                ${isMe ? '👦 我' : '🏃 ' + item.user}
                            </span>
                            <span class="text-[10px] text-gray-400 font-mono">${item.date}</span>
                        </div>
                        <div class="text-sm text-gray-600">
                            在 ${item.subject} 測驗斬獲了 <span class="font-black text-lg mx-1 ${isA ? 'text-rose-600' : 'text-teal-600'}">${item.grade}</span> ${emoji}
                        </div>
                        ${item.photo ? `<div class="absolute right-3 bottom-2 text-purple-400 text-lg opacity-40 group-hover:opacity-100 transition-opacity">📸</div>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        window.renderLeaderboard = () => {
            const container = document.getElementById('leaderboard-feed');
            if(!container) return;

            let userStats = [];
            
            globalUsers.forEach(u => {
                let stats = { user: u, aPlusPlus: 0, aPlus: 0, a: 0, totalEntries: 0 };
                const uGrades = allGrades[u] || {};
                Object.values(uGrades).forEach(dayGrades => {
                    Object.values(dayGrades).forEach(item => {
                        stats.totalEntries++;
                        if (item.grade === 'A++') stats.aPlusPlus++;
                        if (item.grade === 'A+') stats.aPlus++;
                        if (item.grade === 'A') stats.a++;
                    });
                });
                
                // 簡單積分權重: A++得3分, A+得2分, A得1分 (作為排序依據)
                stats.score = stats.aPlusPlus * 3 + stats.aPlus * 2 + stats.a * 1;
                userStats.push(stats);
            });

            // 依據分數降序排列，同分則比刷題總數
            userStats.sort((a, b) => b.score - a.score || b.totalEntries - a.totalEntries);

            if (userStats.length === 0 || userStats[0].totalEntries === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 text-sm mt-4 font-bold">目前無人上榜</div>`;
                return;
            }

            let html = '';
            userStats.forEach((stat, index) => {
                if (stat.totalEntries === 0) return; // 沒填過成績的不列入榜單
                
                let rankMedal = '';
                if (index === 0) rankMedal = '🥇';
                else if (index === 1) rankMedal = '🥈';
                else if (index === 2) rankMedal = '🥉';
                else rankMedal = `<span class="text-teal-700 bg-teal-100 rounded-full w-6 h-6 flex items-center justify-center text-xs font-black shadow-inner">${index + 1}</span>`;

                html += `
                    <div class="bg-white rounded-xl p-2.5 border border-teal-100 shadow-sm flex items-center gap-3 relative hover:scale-[1.02] transition-transform cursor-default">
                        <div class="text-2xl w-8 flex justify-center drop-shadow-sm">${rankMedal}</div>
                        <div class="flex-1">
                            <div class="font-black text-gray-700 text-sm mb-0.5">${stat.user}</div>
                            <div class="text-[10px] text-gray-500 flex gap-2">
                                <span class="text-rose-500 font-bold bg-rose-50 px-1.5 rounded">A++ x ${stat.aPlusPlus}</span>
                                <span class="text-orange-500 font-bold bg-orange-50 px-1.5 rounded">A+ x ${stat.aPlus}</span>
                            </div>
                        </div>
                        <div class="text-center bg-gray-50 p-1.5 rounded-lg border border-gray-100">
                            <div class="text-[10px] text-gray-400 font-bold">總刷題</div>
                            <div class="font-black text-teal-600 text-base leading-none">${stat.totalEntries}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        window.renderMainContent = () => {
            if(window.renderCalendar) window.renderCalendar();
            if(window.renderTimeline) window.renderTimeline();
            if(window.renderLeaderboard) window.renderLeaderboard();
        };


        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                    if(!username) window.renderLogin();
                }
            }, (err) => console.warn("登入監聽失敗:", err));
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                    if(username && window.renderCalendar) window.renderCalendar();
                }
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2026-09-09', title: '第1次模擬考' },
                        { date: '2026-10-13', title: '第1次段考' },
                        { date: '2026-10-28', title: '第2次模擬考' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            const gradesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'AllGrades');
            if(unsubGrades) unsubGrades();
            unsubGrades = onSnapshot(gradesRef, (snap) => {
                if(snap.exists()) allGrades = snap.data().data || {};
                if(username) window.renderMainContent();
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };

            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            username = savedUser;
                            viewingUser = username; // 預設查看自己
                            isAdmin = (username === '管理員' || username === 'Admin');
                            setupListeners();
                            window.renderMain();
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        // ==========================================
        //  動作邏輯
        // ==========================================
        window.saveFirebaseConfig = () => {
            const apiKey = document.getElementById('cfg-apiKey').value.trim();
            if (!apiKey) return alert("API Key 為必填欄位！");
            localStorage.setItem('study_group_firebase_config', JSON.stringify({ apiKey }));
            alert("設定已儲存！系統將重新啟動。");
            window.location.reload(); 
        };

        window.handleLogin = (name) => {
            if(!name.trim()) return alert("請輸入名稱！");
            username = name.trim();
            viewingUser = username; // 登入時將月曆視角切換為自己
            isAdmin = (username === '管理員' || username === 'Admin');
            localStorage.setItem('study_group_user', username);
            
            if (!globalUsers.includes(username)) globalUsers.push(username);

            window.renderMain();

            if (currentUser && db) {
                const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
                getDoc(usersRef).then(snap => {
                    let users = snap.exists() ? snap.data().users || [] : [];
                    if (!users.includes(username)) {
                        users.push(username);
                        setDoc(usersRef, { users }, { merge: true });
                    }
                }).catch(e => console.warn("無法同步帳號至雲端", e));
                setupListeners();
            }
        };

        window.logout = () => {
            username = '';
            viewingUser = '';
            isAdmin = false;
            localStorage.removeItem('study_group_user');
            if(unsubDates) unsubDates();
            if(unsubGrades) unsubGrades();
            if(unsubChat) unsubChat();
            if(unsubUsers) unsubUsers();
            setupLoginListener();
            window.renderLogin();
        };

        window.addImportantDate = async () => {
            const title = document.getElementById('newDateTitle').value;
            const date = document.getElementById('newDateValue').value;
            if(!title || !date) return alert("請填寫完整名稱與日期");
            
            const newDates = [...importantDates, { title, date }];
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates'), { list: newDates });
            document.getElementById('newDateTitle').value = '';
            document.getElementById('newDateValue').value = '';
        };

        window.deleteImportantDate = async (index) => {
            if(!confirm("確定刪除此日程？")) return;
            const newDates = [...importantDates];
            newDates.splice(index, 1);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates'), { list: newDates });
        };

        window.sendChat = async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if(!text) return;
            
            const newMsg = { user: username, text: text, timestamp: new Date().toISOString() };
            const newChat = [...chatMessages, newMsg];
            if(newChat.length > 50) newChat.shift();
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat'), { messages: newChat });
            input.value = '';
        };

        window.openScoreModal = (dateStr) => {
            modalState = { date: dateStr, mainSubject: '', subSubject: '', grade: '', photoBase64: '' };
            document.getElementById('modal-date').innerText = dateStr;
            
            SUBJECTS.forEach(s => { document.getElementById(`btn-sub-${s}`).classList.remove('bg-teal-500', 'text-white'); });
            GRADES.forEach(g => { document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`).classList.remove('bg-rose-500', 'text-white'); });
            
            document.getElementById('sub-subject-container').classList.add('hidden');
            document.getElementById('photo-upload').value = '';
            document.getElementById('photo-preview-container').classList.add('hidden');
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('btn-delete-grade').classList.add('hidden');

            const content = document.getElementById('score-modal-content');

            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        };

        window.viewOthersScore = (otherUser, dateStr) => {
            const data = allGrades[otherUser] && allGrades[otherUser][dateStr];
            if(!data || Object.keys(data).length === 0) {
                alert(`${otherUser} 在 ${dateStr} 尚未登錄任何成績喔！`);
                return; 
            }
            
            document.getElementById('view-modal-date').innerText = dateStr;
            let contentHtml = `<h3 class="font-black text-lg text-teal-800 mb-4 border-b-2 border-teal-200 pb-2">👦 ${otherUser} 的戰果</h3>`;
            
            Object.entries(data).forEach(([subKey, item]) => {
                let isA = item.grade.includes('A');
                let color = isA ? 'text-rose-600 bg-rose-50 border-rose-200' : 'text-teal-700 bg-teal-50 border-teal-200';
                
                contentHtml += `
                    <div class="mb-5 bg-white p-4 rounded-2xl shadow-sm border ${color}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-lg">📌 ${subKey}</span>
                            <span class="font-black text-xl">${item.grade}</span>
                        </div>
                        ${item.photo ? `<div class="mt-3"><img src="${item.photo}" class="w-full rounded-xl border border-gray-200 shadow-sm" alt="考卷照片"></div>` : '<div class="text-xs text-gray-400 text-center mt-2">（無附照片）</div>'}
                    </div>
                `;
            });
            
            document.getElementById('view-score-content').innerHTML = contentHtml;
            
            const modal = document.getElementById('view-score-modal');
            const content = modal.querySelector('div');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        };

        window.closeViewModal = () => {
            const modal = document.getElementById('view-score-modal');
            const content = modal.querySelector('div');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        window.closeModal = () => {
            const modal = document.getElementById('score-modal');
            const content = document.getElementById('score-modal-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        window.selectSubject = (sub) => {
            modalState.mainSubject = sub;
            SUBJECTS.forEach(s => {
                const el = document.getElementById(`btn-sub-${s}`);
                if(s === sub) el.classList.add('bg-teal-500', 'text-white');
                else el.classList.remove('bg-teal-500', 'text-white');
            });

            const subContainer = document.getElementById('sub-subject-container');
            const subSelector = document.getElementById('sub-subject-selector');

            if (SUB_SUBJECTS[sub]) {
                subContainer.classList.remove('hidden');
                subSelector.innerHTML = SUB_SUBJECTS[sub].map(sItem => 
                    `<button onclick="selectSubSubject('${sItem}')" id="btn-subitem-${sItem}" class="py-1.5 rounded-lg border-2 border-blue-200 text-blue-700 font-bold hover:bg-blue-50 transition-colors bg-white shadow-sm text-sm">${sItem}</button>`
                ).join('');

                let subToSelect = SUB_SUBJECTS[sub][0];
                for (let sItem of SUB_SUBJECTS[sub]) {
                    if (allGrades[username]?.[modalState.date]?.[sItem]) {
                        subToSelect = sItem; break;
                    }
                }
                window.selectSubSubject(subToSelect);
            } else {
                subContainer.classList.add('hidden');
                window.selectSubSubject(sub);
            }
        };

        window.selectSubSubject = (subItem) => {
            modalState.subSubject = subItem;
            
            if (SUB_SUBJECTS[modalState.mainSubject]) {
                SUB_SUBJECTS[modalState.mainSubject].forEach(s => {
                    const el = document.getElementById(`btn-subitem-${s}`);
                    if (el) {
                        if(s === subItem) el.classList.add('bg-blue-500', 'text-white');
                        else el.classList.remove('bg-blue-500', 'text-white');
                    }
                });
            }
            
            const existing = allGrades[username]?.[modalState.date]?.[subItem];
            if (existing) {
                window.selectGrade(existing.grade);
                if (existing.photo) setPhotoPreview(existing.photo);
                else {
                     modalState.photoBase64 = '';
                     document.getElementById('photo-preview-container').classList.add('hidden');
                     document.getElementById('photo-placeholder').classList.remove('hidden');
                }
                document.getElementById('btn-delete-grade').classList.remove('hidden');
            } else {
                modalState.grade = '';
                modalState.photoBase64 = '';
                GRADES.forEach(g => { document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`).classList.remove('bg-rose-500', 'text-white'); });
                document.getElementById('photo-preview-container').classList.add('hidden');
                document.getElementById('photo-placeholder').classList.remove('hidden');
                document.getElementById('btn-delete-grade').classList.add('hidden');
            }
        };

        window.selectGrade = (grade) => {
            modalState.grade = grade;
            GRADES.forEach(g => {
                const el = document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`);
                if(g === grade) el.classList.add('bg-rose-500', 'text-white');
                else el.classList.remove('bg-rose-500', 'text-white');
            });
        };

        window.handlePhotoUpload = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400;
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    setPhotoPreview(base64);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        const setPhotoPreview = (base64) => {
            modalState.photoBase64 = base64;
            const preview = document.getElementById('photo-preview');
            preview.src = base64;
            document.getElementById('photo-placeholder').classList.add('hidden');
            document.getElementById('photo-preview-container').classList.remove('hidden');
            document.getElementById('photo-preview-container').classList.add('flex');
        };

        window.saveGrade = async () => {
            if(!modalState.subSubject) return alert("請選擇科目！");
            if(!modalState.grade) return alert("請選擇成績等級！");

            let updatedGrades = JSON.parse(JSON.stringify(allGrades));
            
            if(!updatedGrades[username]) updatedGrades[username] = {};
            if(!updatedGrades[username][modalState.date]) updatedGrades[username][modalState.date] = {};
            
            updatedGrades[username][modalState.date][modalState.subSubject] = {
                grade: modalState.grade,
                photo: modalState.photoBase64 || null,
                updatedAt: new Date().toISOString() // 紀錄更新時間供動態牆排序
            };

            try {
                const gradesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'AllGrades');
                await setDoc(gradesRef, { data: updatedGrades }, { merge: true });
                window.closeModal();
            } catch(e) {
                console.error(e);
                alert("儲存失敗，請確認圖片是否過大！");
            }
        };

        window.deleteGradeRecord = async () => {
            if(!modalState.subSubject) return;
            if(!confirm(`確定要刪除 ${modalState.date} 的 ${modalState.subSubject} 紀錄嗎？`)) return;

            let updatedGrades = JSON.parse(JSON.stringify(allGrades));
            if(updatedGrades[username]?.[modalState.date]?.[modalState.subSubject]) {
                delete updatedGrades[username][modalState.date][modalState.subSubject];
                
                if(Object.keys(updatedGrades[username][modalState.date]).length === 0) {
                    delete updatedGrades[username][modalState.date];
                }

                try {
                    const gradesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'AllGrades');
                    await setDoc(gradesRef, { data: updatedGrades }, { merge: true });
                    window.closeModal();
                } catch(e) {
                    console.error(e);
                }
            }
        };

        document.addEventListener('click', (e) => {
            const scoreModal = document.getElementById('score-modal');
            if (e.target === scoreModal) window.closeModal();
            
            const viewModal = document.getElementById('view-score-modal');
            if (e.target === viewModal) window.closeViewModal();
            
            // 點擊外部關閉 Emoji 選單
            const emojiPicker = document.getElementById('emoji-picker');
            const toggleBtn = document.getElementById('emoji-toggle-btn');
            if (emojiPicker && !emojiPicker.classList.contains('hidden')) {
                if (!emojiPicker.contains(e.target) && e.target !== toggleBtn) {
                    emojiPicker.classList.add('hidden');
                }
            }
        });

        // ==========================================
        //  啟動 App
        // ==========================================
        initApp();

    </script>
</body>
</html>
