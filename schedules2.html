        // --- 3. React 主元件 ---
        function App() {
            // 使用 lazy initialization 確保 safeStorage 只在初始化時執行
            const [apiKey, setApiKey] = useState(() => safeStorage.getItem('study_firebase_api_key') || '');
            const [showSettings, setShowSettings] = useState(!apiKey);
            const [tempApiKey, setTempApiKey] = useState(apiKey);
            
            const [firebaseDb, setFirebaseDb] = useState(null);
            const [user, setUser] = useState(null);
            const [syncStatus, setSyncStatus] = useState('offline');
            
            const [activeSubject, setActiveSubject] = useState("國文");
            const [progressData, setProgressData] = useState({});

            // 初始化 Firebase
            useEffect(() => {
                if (!apiKey || typeof window.firebase === 'undefined') return;
                
                try {
                    setSyncStatus('syncing');
                    const config = { ...BASE_FIREBASE_CONFIG, apiKey };
                    
                    // 確保沒有重複初始化
                    if (!window.firebase.apps.length) {
                        window.firebase.initializeApp(config);
                    }
                    
                    const auth = window.firebase.auth();
                    const db = window.firebase.firestore();
                    
                    setFirebaseDb(db);

                    // 先進行匿名登入
                    auth.signInAnonymously().catch(error => {
                        console.error("Firebase 登入失敗:", error);
                        setSyncStatus('error');
                    });

                    const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
                        setUser(currentUser);
                    });

                    return () => unsubscribeAuth();
                } catch (error) {
                    console.error("Firebase 初始設定失敗:", error);
                    setSyncStatus('error');
                }
            }, [apiKey]);

            // 監聽 Firestore 資料
            useEffect(() => {
                if (!user || !firebaseDb) return;
                
                setSyncStatus('syncing');
                
                const docRef = firebaseDb.collection('artifacts')
                                        .doc(appId)
                                        .collection('users')
                                        .doc(user.uid)
                                        .collection('study_data')
                                        .doc('progress');

                const unsubscribeSnapshot = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if (data && data.progress) {
                            setProgressData(data.progress);
                        }
                    }
                    setSyncStatus('synced');
                }, (error) => {
                    console.error("Firestore 讀取失敗:", error);
                    setSyncStatus('error');
                });

                return () => unsubscribeSnapshot();
            }, [user, firebaseDb]);

            // 處理 API Key 儲存
            const handleSaveApiKey = () => {
                if (tempApiKey.trim()) {
                    safeStorage.setItem('study_firebase_api_key', tempApiKey.trim());
                    setApiKey(tempApiKey.trim());
                    setShowSettings(false);
                    window.location.reload(); 
                }
            };

            // 清除 API Key 並登出
            const handleClearApiKey = () => {
                safeStorage.removeItem('study_firebase_api_key');
                setApiKey('');
                setTempApiKey('');
                setUser(null);
                setFirebaseDb(null);
                setSyncStatus('offline');
                setProgressData({});
                setShowSettings(true);
            };

            // 切換章節完成狀態
            const toggleChapter = async (textbookId, chapterIndex) => {
                const key = `${textbookId}_${chapterIndex}`;
                const newValue = !progressData[key];
                
                // 樂觀更新 UI
                const newProgressData = { ...progressData, [key]: newValue };
                setProgressData(newProgressData);

                // 同步至 Firestore
                if (user && firebaseDb) {
                    setSyncStatus('syncing');
                    try {
                        const docRef = firebaseDb.collection('artifacts')
                                                .doc(appId)
                                                .collection('users')
                                                .doc(user.uid)
                                                .collection('study_data')
                                                .doc('progress');
                        await docRef.set({ progress: newProgressData }, { merge: true });
                        setSyncStatus('synced');
                    } catch (error) {
                        console.error("進度儲存失敗:", error);
                        setSyncStatus('error');
                        // 失敗則還原進度
                        setProgressData(progressData);
                    }
                }
            };

            // 計算科目整體進度
            const getSubjectProgress = (subjectName) => {
                const textbooks = TEXTBOOKS[subjectName];
                let total = 0;
                let completed = 0;

                textbooks.forEach(tb => {
                    tb.chapters.forEach((_, idx) => {
                        total++;
                        if (progressData[`${tb.id}_${idx}`]) {
                            completed++;
                        }
                    });
                });

                return { total, completed, percentage: total === 0 ? 0 : Math.round((completed / total) * 100) };
            };

            // 內部小元件：進度條
            const ProgressBar = ({ percentage, colorClass }) => (
                <div className="w-full bg-slate-200 rounded-full h-2.5 mt-2 overflow-hidden">
                    <div className={`h-2.5 rounded-full transition-all duration-500 ${colorClass}`} style={{ width: `${percentage}%` }}></div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 md:pb-6">
                    {/* 頂部導航列 */}
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 text-indigo-600">
                                <BookOpenIcon size={24} className="stroke-[2.5]" />
                                <h1 className="font-bold text-lg md:text-xl tracking-tight">會考複習進度</h1>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {/* 同步狀態指示器 */}
                                <div className="hidden md:flex items-center gap-1.5 text-xs font-medium px-2 py-1.5 rounded-md bg-slate-100">
                                    {syncStatus === 'offline' && <><AlertCircleIcon size={14} className="text-slate-400"/> 未連線</>}
                                    {syncStatus === 'syncing' && <><RefreshIcon size={14} className="text-blue-500 animate-spin"/> 同步中</>}
                                    {syncStatus === 'synced' && <><CheckCircleIcon size={14} className="text-green-600"/> 已同步</>}
                                    {syncStatus === 'error' && <><AlertCircleIcon size={14} className="text-red-500"/> 同步失敗</>}
                                </div>
                                
                                <button 
                                    onClick={() => setShowSettings(true)}
                                    className="p-2 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-full transition-colors relative"
                                    title="設定"
                                >
                                    <SettingsIcon size={22} />
                                    {!apiKey && <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        
                        {/* 科目選擇標籤 (橫向滾動) */}
                        <div className="flex overflow-x-auto pb-4 mb-6 hide-scrollbar gap-2.5 snap-x">
                            {Object.keys(TEXTBOOKS).map(subject => {
                                const progress = getSubjectProgress(subject);
                                const isActive = activeSubject === subject;
                                const colors = SUBJECT_COLORS[subject];
                                
                                return (
                                    <button
                                        key={subject}
                                        onClick={() => setActiveSubject(subject)}
                                        className={`snap-start shrink-0 px-4 py-3 rounded-xl border-2 transition-all flex flex-col items-start min-w-[120px] shadow-sm
                                            ${isActive ? colors : 'border-slate-200 bg-white hover:border-slate-300 text-slate-600'}
                                        `}
                                    >
                                        <span className="font-bold mb-1 text-[15px]">{subject}</span>
                                        <div className="w-full flex items-center justify-between text-xs mt-auto">
                                            <span>{progress.completed}/{progress.total}</span>
                                            <span className="font-semibold">{progress.percentage}%</span>
                                        </div>
                                        <ProgressBar 
                                            percentage={progress.percentage} 
                                            colorClass={isActive ? 'bg-current opacity-50' : 'bg-slate-300'} 
                                        />
                                    </button>
                                );
                            })}
                        </div>

                        {/* 當前科目的章節內容 */}
                        <div className="space-y-6">
                            <div className="flex items-center justify-between">
                                <h2 className="text-2xl font-bold flex items-center gap-2">
                                    <span className="w-1.5 h-6 bg-indigo-500 rounded-full inline-block"></span>
                                    {activeSubject} 清單
                                </h2>
                                <span className="text-slate-500 text-sm font-medium bg-slate-100 px-3 py-1 rounded-full">
                                    共 {getSubjectProgress(activeSubject).total} 個進度
                                </span>
                            </div>

                            {TEXTBOOKS[activeSubject].map((textbook) => {
                                // 計算單一講義的進度
                                let tbCompleted = 0;
                                textbook.chapters.forEach((_, idx) => {
                                    if (progressData[`${textbook.id}_${idx}`]) tbCompleted++;
                                });
                                const tbTotal = textbook.chapters.length;
                                const tbPercentage = Math.round((tbCompleted / tbTotal) * 100);

                                return (
                                    <div key={textbook.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-50 px-5 py-4 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                            <div>
                                                <h3 className="font-bold text-lg text-slate-800">{textbook.name}</h3>
                                                <p className="text-xs text-slate-500 mt-1 font-mono">ID: {textbook.id.toUpperCase()}</p>
                                            </div>
                                            <div className="flex items-center gap-4 w-full sm:w-auto bg-white p-2 sm:p-0 sm:bg-transparent rounded-lg border sm:border-0 border-slate-100">
                                                <div className="text-right flex-1 sm:flex-none">
                                                    <div className="text-sm font-bold text-indigo-700">{tbPercentage}%</div>
                                                    <div className="text-xs text-slate-500">{tbCompleted} / {tbTotal}</div>
                                                </div>
                                                <div className="w-24 shrink-0 hidden sm:block">
                                                    <ProgressBar percentage={tbPercentage} colorClass="bg-indigo-500" />
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="p-3 sm:p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 sm:gap-3">
                                            {textbook.chapters.map((chapter, index) => {
                                                const isChecked = !!progressData[`${textbook.id}_${index}`];
                                                return (
                                                    <button
                                                        key={index}
                                                        onClick={() => toggleChapter(textbook.id, index)}
                                                        className={`flex items-start gap-3 p-3.5 rounded-xl transition-all text-left border shadow-sm
                                                            ${isChecked 
                                                                ? 'bg-indigo-50 border-indigo-200 text-indigo-900' 
                                                                : 'bg-white border-slate-100 hover:border-slate-300 text-slate-700'
                                                            }
                                                        `}
                                                    >
                                                        <div className="mt-0.5 shrink-0">
                                                            {isChecked ? (
                                                                <CheckCircleIcon className="text-indigo-600 drop-shadow-sm" size={20} />
                                                            ) : (
                                                                <CircleIcon className="text-slate-300" size={20} />
                                                            )}
                                                        </div>
                                                        <span className={`text-[15px] leading-snug ${isChecked ? 'line-through opacity-60' : 'font-medium'}`}>
                                                            {chapter}
                                                        </span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* 設定面板 Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                                <div className="bg-gradient-to-r from-indigo-600 to-indigo-700 px-6 py-5 text-white">
                                    <h3 className="font-bold text-xl flex items-center gap-2">
                                        <SettingsIcon size={22} />
                                        雲端同步設定
                                    </h3>
                                    <p className="text-indigo-100 text-sm mt-1.5">輸入 Firebase API Key 來啟用跨裝置進度同步。</p>
                                </div>
                                
                                <div className="p-6 space-y-5">
                                    {!apiKey && (
                                        <div className="bg-amber-50 text-amber-800 p-4 rounded-xl flex gap-3 items-start border border-amber-200">
                                            <AlertCircleIcon size={20} className="shrink-0 mt-0.5 text-amber-600" />
                                            <div className="text-sm">
                                                <p className="font-bold mb-1">尚未設定 API Key</p>
                                                <p className="text-amber-700/90 leading-relaxed">目前資料僅暫存於記憶體，重新載入將會遺失。請填入您的 API Key 啟用雲端功能。</p>
                                            </div>
                                        </div>
                                    )}

                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-slate-700 block">Firebase API Key</label>
                                        <input 
                                            type="text" 
                                            value={tempApiKey}
                                            onChange={(e) => setTempApiKey(e.target.value)}
                                            placeholder="請輸入 AIzaSyB... 格式的金鑰"
                                            className="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white outline-none font-mono text-sm transition-all"
                                        />
                                        <p className="text-xs text-slate-500 mt-1.5 flex items-center gap-1">
                                            <Icon size={14}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Icon>
                                            金鑰將安全地儲存在您的瀏覽器中 (localStorage)。
                                        </p>
                                    </div>
                                </div>

                                <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                                    {apiKey ? (
                                        <button 
                                            onClick={handleClearApiKey}
                                            className="text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-1.5"
                                        >
                                            <LogOutIcon size={18} />
                                            清除並登出
                                        </button>
                                    ) : <div></div>}
                                    
                                    <div className="flex gap-2">
                                        {apiKey && (
                                            <button 
                                                onClick={() => setShowSettings(false)}
                                                className="px-4 py-2 text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-xl text-sm font-bold transition-colors"
                                            >
                                                取消
                                            </button>
                                        )}
                                        <button 
                                            onClick={handleSaveApiKey}
                                            disabled={!tempApiKey.trim()}
                                            className="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-sm transition-all flex items-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            <SaveIcon size={18} />
                                            儲存設定
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 4. 啟動應用 ---
        try {
            const rootElement = document.getElementById('root');
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } catch (error) {
            console.error("渲染失敗:", error);
            const log = document.getElementById('error-log');
            if(log) {
                log.style.display = 'block';
                log.innerText += '\n[啟動錯誤] ' + error.message;
            }
        }
    </script>
</body>
</html>
