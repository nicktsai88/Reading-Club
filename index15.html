            color: #4a4a4a;

            background: rgba(255, 255, 255, 0.85);

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        /* 垂直跑馬燈效果設定 */
        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {
            animation-play-state: paused;
        }

        window.openGlobalModal = (id) => {
            const modal = document.getElementById(id);

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const inner = modal.firstElementChild;
                if(inner.classList.contains('scale-95')) {
                    inner.classList.remove('scale-95');
                }
            }, 10);
        };

        window.closeGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.add('opacity-0');
            const inner = modal.firstElementChild;
            if(inner && inner.classList.contains('scale-95') === false) {
                inner.classList.add('scale-95');
            }
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        // ==========================================
        //  進度追蹤 Modal 邏輯
        // ==========================================
        window.openProgressModal = () => {
            const targetUser = viewingUser === 'ALL' ? username : viewingUser;
            if (!targetUser) return;
            const dispName = usersProfile[targetUser]?.nickname || targetUser;
            document.getElementById('progress-user-name').innerText = `📈 ${dispName} 的闖關進度`;

            const uGrades = allGrades[targetUser] || {};
            
            const getBestGrade = (subKey) => {
                let bestObj = null;
                let bestW = 0;

                Object.entries(uGrades).forEach(([dateStr, dayData]) => {
                    if(dayData[subKey]) {
                        const g = dayData[subKey].grade;
                        const w = GRADE_WEIGHT[g] || 0;
                        if(w > bestW) {
                            bestW = w;
                            bestObj = { grade: g, date: dateStr };
                        }
                    }
                });
                return bestObj;
            };

            const renderGradeBadge = (bestObj) => {
                if(!bestObj) return `<div class="bg-gray-200 text-gray-400 text-[10px] sm:text-xs py-1.5 px-1 rounded font-bold mx-auto w-full text-center">無紀錄</div>`;
                const grade = bestObj.grade;
                const isA = grade.includes('A');
                const borderColor = isA ? 'border-red-500 text-red-500' : 'border-orange-500 text-orange-500';
                const bgColor = isA ? 'bg-red-50' : 'bg-orange-50';
                return `<div class="${bgColor} ${borderColor} border text-[11px] sm:text-sm py-1.5 px-1 rounded-sm font-black mx-auto w-full text-center shadow-sm">${grade}</div>`;
            };

            const buildHorizontalTable = (title, imgSrc, chapters, subjectKeyFn) => {
                const formatChapterHtml = (ch) => {
                    if (ch.includes('會考模擬試題')) {
                        return `<div class="step3-color-exam font-black text-center w-full text-[11px] sm:text-xs leading-tight whitespace-pre-line flex items-center justify-center h-full">${ch.replace(' ', '\n')}</div>`;
                    }
                    
                    let line1 = '';
                    let line2 = '';
                    let line3 = '';
                    
                    // 智慧拆分章節字串
                    const parts = ch.split(' ');
                    if (parts.length >= 2 && parts[0].startsWith('單元')) {
                        line1 = parts[0];
                        line2 = parts[1];
                        line3 = parts.slice(2).join(' ');
                    } else if (parts.length >= 2 && parts[0].includes('會考模擬試題')) {
                        line1 = parts[0];
                        line2 = parts.slice(1).join(' ');
                    }
                    
                    // 根據是否有匹配到主標題來決定渲染三行或單行
                    if (line1) {
                        let html = '';
                        html += `<div class="text-[#DC143C] text-[12px] sm:text-[14px] font-black mb-0.5 leading-tight w-full text-center">${line1}</div>`;
                        html += `<div class="text-[#0066FF] text-[11px] sm:text-xs font-black mb-0.5 leading-tight w-full text-center">${line2}</div>`;
                        if (line3) {
                            html += `<div class="text-[10px] sm:text-[11px] text-gray-700 font-bold leading-tight whitespace-pre-line w-full text-center">${line3}</div>`;
                        }
                        return html;
                    } else {
                        return `<div class="text-[10px] sm:text-xs text-gray-700 font-bold leading-tight whitespace-pre-line w-full text-center flex items-center justify-center h-full">${ch}</div>`;
                    }
                };

                let tableHtml = `
                <div class="overflow-x-auto custom-scrollbar pb-3 relative">
                    <div class="inline-flex min-w-full border-2 border-gray-300 rounded-xl bg-white shadow-sm">
                        <div class="w-28 sm:w-36 flex flex-col items-center justify-center p-2 border-r-2 border-gray-300 bg-gray-50 shrink-0 sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] rounded-l-xl">
                            <div class="font-black text-xs sm:text-sm text-center mb-2 text-gray-800 whitespace-pre-line leading-relaxed">${title}</div>
                            ${imgSrc ? `<img src="${imgSrc}" class="w-16 h-24 sm:w-20 sm:h-28 object-cover shadow-sm border border-gray-200 rounded" onerror="this.style.display='none'">` : '<div class="text-3xl sm:text-4xl opacity-40 my-2">📚</div>'}
                        </div>
                        <div class="flex flex-row divide-x-2 divide-gray-200">
                `;
                chapters.forEach(ch => {
                    const queryKey = subjectKeyFn(ch);
                    const bestObj = getBestGrade(queryKey);
                    const cursorClass = bestObj ? 'cursor-pointer hover:bg-gray-100 hover:shadow-inner' : 'hover:bg-gray-50';
                    const clickAttr = bestObj ? `onclick="viewOthersScore(event, '${targetUser}', '${bestObj.date}')"` : '';
                    
                    tableHtml += `
                            <div ${clickAttr} class="w-24 sm:w-32 flex flex-col items-center justify-start p-2 shrink-0 bg-white transition-colors ${cursorClass}">
                                <div class="w-full h-auto min-h-[4rem] flex flex-col items-center justify-center mb-2">
                                    ${formatChapterHtml(ch)}
                                </div>
                                <div class="w-full mt-auto pb-1 px-1">
                                    ${renderGradeBadge(bestObj)}
                                </div>
                            </div>
                    `;
                });
                tableHtml += `
                        </div>
                    </div>
                </div>
                `;
                return tableHtml;
            };

            let html = '<div class="space-y-6">';
            
            // 國文 (麻辣講義)
            html += buildHorizontalTable('國文\n(麻辣講義)', 'images/c1.jpg', CHINESE_CHAPTERS, (ch) => ch);
            
            // 英文 (超會考)
            html += buildHorizontalTable('英文\n(超會考)', 'images/e1.jpg', ENGLISH_CHAPTERS, (ch) => ch);

            // 數學 (麻辣講義)
            html += buildHorizontalTable('數學\n(麻辣講義)', 'images/m1.jpg', MATH_CHAPTERS, (ch) => ch);

            // 生物 (麻辣講義)
            html += buildHorizontalTable('生物\n(麻辣講義)', 'images/b1.jpg', BIO_CHAPTERS, (ch) => ch);

            // 生物 (大滿貫) - 新增
            html += buildHorizontalTable('生物\n(大滿貫)', 'images/b2.jpg', BIO_CHAPTERS_2, (ch) => ch);

            // 理化 (大滿貫)
            html += buildHorizontalTable('理化\n(大滿貫)', 'images/p1.jpg', PHY_CHAPTERS, (ch) => ch);

            // 歷史 (大滿貫)
            html += buildHorizontalTable('歷史\n(大滿貫)', 'images/h1.jpg', HISTORY_CHAPTERS, (ch) => ch);

            // 自然合科
            html += buildHorizontalTable('自然合科', null, SUB_SUBJECTS['自然'], (sub) => sub);

            // 社會合科
            html += buildHorizontalTable('社會合科', null, SUB_SUBJECTS['社會'], (sub) => sub);

            html += '</div>';

            document.getElementById('progress-content').innerHTML = html;
            openGlobalModal('progress-modal');
        };

        // ==========================================
        //  學科分析雷達圖邏輯
        // ==========================================
        window.openAnalysisModal = () => {
            const targetUser = viewingUser === 'ALL' ? username : viewingUser;
            if (!targetUser) return;

            const dispName = usersProfile[targetUser]?.nickname || targetUser;
            document.getElementById('analysis-user-name').innerText = `👤 ${dispName} 的戰力分析`;
            
            // 要求的九大科目
            const analysisSubjects = ['國文', '英文', '數學', '生物', '理化', '地科', '歷史', '地理', '公民'];
            
            const gradeToNum = (g) => {
                const map = { 'A++': 7, 'A+': 6, 'A': 5, 'B++': 4, 'B+': 3, 'B': 2, 'C': 1 };
                return map[g] !== undefined ? map[g] : null;
            };

            const uGrades = allGrades[targetUser] || {};
            let subjectTotals = {};
            let subjectCounts = {};
            let subjectDetails = {};

            analysisSubjects.forEach(sub => {
                subjectTotals[sub] = 0;
                subjectCounts[sub] = 0;
                subjectDetails[sub] = { 'A++':0, 'A+':0, 'A':0, 'B++':0, 'B+':0, 'B':0, 'C':0 };
            });

            // 抓取各科目「所有」的成績資料並加總
            Object.keys(uGrades).forEach(dateStr => {
                Object.keys(uGrades[dateStr]).forEach(subKey => {
                    const item = uGrades[dateStr][subKey];
                    // 為了容納超長章節名稱，比對該紀錄的 mainSubject 是否為雷達圖的對象
                    const actualSub = analysisSubjects.includes(subKey) ? subKey : (analysisSubjects.includes(item.mainSubject) ? item.mainSubject : null);
                    
                    if (actualSub && analysisSubjects.includes(actualSub)) {
                        const grade = item.grade;
                        const num = gradeToNum(grade);
                        if (num !== null) {
                            subjectTotals[actualSub] += num;
                            subjectCounts[actualSub] += 1;
                            if(subjectDetails[actualSub][grade] !== undefined) {
                                subjectDetails[actualSub][grade]++;
                            }
                        }
                    }
                });
            });

            const dataPoints = analysisSubjects.map(sub => {
                if (subjectCounts[sub] === 0) return 0;
                return parseFloat((subjectTotals[sub] / subjectCounts[sub]).toFixed(2));
            });

            openGlobalModal('analysis-modal');

            setTimeout(() => {
                const ctx = document.getElementById('radarChart').getContext('2d');
                if (radarChartInstance) {
                    radarChartInstance.destroy();
                }
                radarChartInstance = new Chart(ctx, {
                    type: 'radar',
                    plugins: [window.ChartDataLabels],
                    data: {
                        labels: analysisSubjects,
                        datasets: [{
                            label: '平均能力 (滿分 7)',
                            data: dataPoints,
                            backgroundColor: 'rgba(99, 102, 241, 0.2)',
                            borderColor: 'rgba(99, 102, 241, 1)',
                            pointBackgroundColor: 'rgba(99, 102, 241, 1)',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: 'rgba(99, 102, 241, 1)',
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            borderWidth: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: 40 },
                        scales: {
                            r: {
                                min: 0, max: 7,
                                angleLines: { color: 'rgba(0,0,0,0.1)' },
                                grid: { color: 'rgba(0,0,0,0.1)' },
                                pointLabels: { display: false },
                                ticks: { stepSize: 1, display: false }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false },
                            datalabels: {
                                color: '#4338ca',
                                font: { family: 'Noto Sans TC', size: 14, weight: 'bold' },
                                formatter: function(value, context) {
                                    const sub = context.chart.data.labels[context.dataIndex];
                                    return sub + '\n' + value + ' 分';
                                },
                                textAlign: 'center', align: 'end', anchor: 'end', offset: 5,
                                listeners: {
                                    click: function(context) {
                                        const sub = context.chart.data.labels[context.dataIndex];
                                        const details = subjectDetails[sub];
                                        if(!details) return;
                                        const statsStr = `【${sub}】統計數據\nA++ : ${details['A++']}次\nA+ : ${details['A+']}次\nA : ${details['A']}次\nB++ : ${details['B++']}次\nB+ : ${details['B+']}次\nB : ${details['B']}次\nC : ${details['C']}次\n總計 : ${subjectCounts[sub]}次`;
                                        alert(statsStr);
                                        return true;
                                    }
                                }
                            }
                        },
                        onClick: (e, elements) => {
                            if (elements.length > 0) {
                                const idx = elements[0].index;
                                const sub = analysisSubjects[idx];
                                const details = subjectDetails[sub];
                                if(!details) return;
                                const statsStr = `【${sub}】統計數據\nA++ : ${details['A++']}次\nA+ : ${details['A+']}次\nA : ${details['A']}次\nB++ : ${details['B++']}次\nB+ : ${details['B+']}次\nB : ${details['B']}次\nC : ${details['C']}次\n總計 : ${subjectCounts[sub]}次`;
                                alert(statsStr);
                            }
                        }
                    }
                });
            }, 100);
        };

        // ==========================================

        window.handleProfilePhoto = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('prof-photo-upload').dataset.base64 = base64;
                    document.getElementById('prof-photo-preview').src = base64;
                    document.getElementById('prof-photo-preview').classList.remove('hidden');
                    document.getElementById('prof-photo-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

            if(!confirm(`⚠️ 警告！確定要刪除帳號 [${userToDelete}] 嗎？此操作不可逆！`)) return;
            
            let transferTarget = null;
            const others = globalUsers.filter(u => u !== userToDelete);
            if (others.length > 0) {
                const ans = prompt(`是否轉移其成績給其他人？\n(若不轉移請留空按確定，將連帶刪除所有成績)\n可選對象: ${others.join(', ')}`);
                if (ans && others.includes(ans.trim())) {
                    transferTarget = ans.trim();
                } else if (ans) {
                    return alert("輸入的名稱無效，已取消刪除操作。");
                }
            }

            try {
                const newUsers = globalUsers.filter(u => u !== userToDelete);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList'), { users: newUsers });

                let newProfiles = JSON.parse(JSON.stringify(usersProfile));
                delete newProfiles[userToDelete];

                if (allGrades[userToDelete]) {
                    const dates = Object.keys(allGrades[userToDelete]);
                    for (let i = 0; i < dates.length; i++) {
                        const dateStr = dates[i];
                        const subs = Object.keys(allGrades[userToDelete][dateStr]);
                        for (let j = 0; j < subs.length; j++) {

                            const oldDocId = `${userToDelete}_${dateStr}_${sub}`;
                            const oldRef = doc(db, 'artifacts', appId, 'public', 'data', 'Grades', oldDocId);
                            
                            if (transferTarget) {

                                const newRef = doc(db, 'artifacts', appId, 'public', 'data', 'Grades', newDocId);
                                const gradeData = allGrades[userToDelete][dateStr][sub];
                                await setDoc(newRef, {
                                    user: transferTarget,
                                    date: dateStr,
                                    mainSubject: gradeData.mainSubject || gradeData.subSubject || sub,
                                    subSubject: sub,
                                    grade: gradeData.grade,
                                    photo: gradeData.photo || null,
                                    updatedAt: gradeData.updatedAt || new Date().toISOString()
                                });
                            }

                        }

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();

            let html = `<div class="grid grid-cols-7 gap-1 md:gap-2 mb-2 shrink-0">`;
            ['一', '二', '三', '四', '五', '六', '日'].forEach((d, idx) => {

                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === formatDate(new Date());
                const isImportant = importantDates.find(i => i.date === dateStr);
                
                let usersWithDataToday = [];
                Object.entries(allGrades).forEach(([u, dates]) => {
                    if (dates[dateStr] && Object.keys(dates[dateStr]).length > 0) {
                        if (viewingUser === 'ALL' || u === viewingUser) {
                            usersWithDataToday.push(u);

                    }
                });
                
                let cellContent = '';
                const buildBadge = (subKey, info, prefix = '') => {
                    let subColor = getSubjectColor(subKey);
                    if (subColor === SUBJECT_COLORS['default'] && info.mainSubject) {
                        subColor = getSubjectColor(info.mainSubject);
                    }

                    let shortName = subKey;
                    if(info.mainSubject === '國文') shortName = '國文';
                    else if(subKey === '自然合科') shortName = '自';
                    else if(subKey === '社會合科') shortName = '社';
                    else if(subKey === '地科' || subKey === '地球科學') shortName = '地科';
                    else if(subKey === '地理') shortName = '地理';
                    else shortName = subKey.charAt(0);

                    return `
                        <div class="text-[9px] md:text-[11px] font-bold ${subColor.bg} ${subColor.text} ${subColor.border} border px-1 py-0.5 rounded flex items-center justify-between shadow-sm">
                            <span class="truncate">${prefix}${shortName} <span class="font-black">${info.grade}</span></span>
                            ${info.photo ? '<span class="text-[8px] md:text-[9px] text-purple-500">📸</span>' : ''}
                        </div>
                    `;
                };

                if (viewingUser === 'ALL') {
                    let hasAny = false;
                    let tempContent = `<div class="flex flex-col gap-1 w-full mt-1 pb-1">`;
                    Object.entries(allGrades).forEach(([u, dates]) => {
                        if (dates[dateStr] && Object.keys(dates[dateStr]).length > 0) {
                            hasAny = true;
                            const uChar = getAvatarChar(u);
                            const prefix = `<span class="opacity-60 mr-1 text-[8px]">${uChar}</span>`;
                            Object.entries(dates[dateStr]).forEach(([subKey, info]) => {
                                tempContent += buildBadge(subKey, info, prefix);
                            });
                        }
                    });
                    tempContent += `</div>`;
                    if (hasAny) cellContent = tempContent;
                } else {
                    const userGrades = (allGrades[viewingUser] && allGrades[viewingUser][dateStr]) ? allGrades[viewingUser][dateStr] : null;
                    if (userGrades && Object.keys(userGrades).length > 0) {
                        cellContent = `<div class="flex flex-col gap-1 w-full mt-1 pb-1">`;
                        Object.entries(userGrades).forEach(([subKey, info]) => {
                            cellContent += buildBadge(subKey, info);
                        });
                        cellContent += `</div>`;
                    }
                }

                const headerClass = isToday 
                    ? 'bg-gradient-to-r from-teal-400 to-emerald-400 text-white shadow-md' 
                    : isImportant 
                        ? 'bg-gradient-to-r from-orange-400 to-rose-400 text-white shadow-md' 
                        : 'bg-pink-50 text-pink-700';

                const clickAction = (viewingUser === username || viewingUser === 'ALL') 
                    ? `openScoreModal('${dateStr}')` 
                    : `viewOthersScore(event, '${viewingUser}', '${dateStr}')`;

                html += `
                    <div onclick="${clickAction}" class="bg-white border-2 border-pink-100 p-1 md:p-2 rounded-xl md:rounded-2xl shadow-sm flex flex-col transition-all cursor-pointer hover:border-teal-400 hover:shadow-md hover:-translate-y-1 overflow-hidden group relative">
                        <div class="flex justify-between items-start shrink-0 mb-0.5 md:mb-1 w-full">
                            <span class="w-5 h-5 md:w-7 md:h-7 flex items-center justify-center rounded-full text-xs md:text-sm font-bold ${headerClass} shrink-0">${d}</span>
                            
                            <div class="flex flex-wrap justify-end gap-1 flex-1 mx-1 mt-0.5 overflow-hidden">
                                ${usersWithDataToday.map(u => `
                                    <div onclick="viewOthersScore(event, '${u}', '${dateStr}')" 
                                         class="${getUserColor(u)} w-4 h-4 md:w-5 md:h-5 rounded-full flex items-center justify-center text-[9px] md:text-[11px] font-bold shadow-sm cursor-pointer hover:scale-110 transition-transform flex-shrink-0" 
                                         title="查看 ${usersProfile[u]?.nickname || u} 的成績">
                                        ${getAvatarChar(u)}
                                    </div>
                                `).join('')}
                            </div>
                            ${isImportant ? `<span class="text-xs md:text-sm drop-shadow-sm group-hover:scale-125 transition-transform shrink-0" title="${isImportant.title}">🔥</span>` : ''}
                        </div>
                        <div class="flex-1 overflow-y-auto custom-scrollbar">
                            ${cellContent}
                        </div>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        };

        window.renderTimeline = () => {
            const container = document.getElementById('timeline-feed');
            if(!container) return;

            const feed = [];
            Object.entries(allGrades).forEach(([u, dates]) => {
                Object.entries(dates).forEach(([d, subjects]) => {
                    Object.entries(subjects).forEach(([s, info]) => {
                        feed.push({ user: u, date: d, subject: s, ...info });
                    });
                });
            });

            feed.sort((a,b) => {
                const timeA = a.updatedAt ? new Date(a.updatedAt) : new Date(a.date);
                const timeB = b.updatedAt ? new Date(b.updatedAt) : new Date(b.date);
                return timeB - timeA;
            });

            if (feed.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-70"><div class="text-4xl mb-2">🍃</div><div class="text-sm font-bold">尚無戰況紀錄，趕快搶頭香！</div></div>`;
                return;
            }

            let html = '';
            feed.forEach(item => {
                const isMe = item.user === username;
                const isA = item.grade.includes('A');
                const emoji = isA ? '🏆' : '💪';
                
                const mainSub = item.mainSubject || item.subject;
                const subColor = getSubjectColor(mainSub);
                const displayName = usersProfile[item.user]?.nickname || item.user;

                const mainSubStr = item.mainSubject && item.mainSubject !== item.subject ? `${item.mainSubject} ` : '';
                const fullSubStr = `${mainSubStr}${item.subject}`;

                html += `
                    <div class="p-3 rounded-2xl border-2 ${subColor.border} ${subColor.bg} shadow-sm relative group cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all" onclick="viewOthersScore(null, '${item.user}', '${item.date}')">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-gray-700 bg-white px-2 py-0.5 rounded shadow-sm text-xs border border-gray-100 flex items-center gap-1.5">
                                <div class="w-3 h-3 rounded-full flex items-center justify-center text-[8px] ${getUserColor(item.user)}">${getAvatarChar(item.user)}</div>

                        </div>
                        <div class="text-sm text-gray-600">

                        </div>
                        ${item.photo ? `<div class="absolute right-3 bottom-2 text-purple-400 text-lg opacity-40 group-hover:opacity-100 transition-opacity">📸</div>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        window.renderLeaderboard = () => {
            const container = document.getElementById('leaderboard-feed');
            if(!container) return;

            let userStats = [];
            globalUsers.forEach(u => {
                let stats = { user: u, aPlusPlus: 0, aPlus: 0, a: 0, totalEntries: 0 };
                const uGrades = allGrades[u] || {};
                Object.values(uGrades).forEach(dayGrades => {
                    Object.values(dayGrades).forEach(item => {
                        stats.totalEntries++;
                        if (item.grade === 'A++') stats.aPlusPlus++;
                        if (item.grade === 'A+') stats.aPlus++;
                        if (item.grade === 'A') stats.a++;
                    });
                });
                stats.score = stats.aPlusPlus * 3 + stats.aPlus * 2 + stats.a * 1;
                userStats.push(stats);
            });

            userStats.sort((a, b) => b.score - a.score || b.totalEntries - a.totalEntries);

            if (userStats.length === 0 || userStats[0].totalEntries === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 text-sm mt-4 font-bold">目前無人上榜</div>`;
                return;
            }

            let html = '';
            userStats.forEach((stat, index) => {
                if (stat.totalEntries === 0) return;
                let rankMedal = '';
                if (index === 0) rankMedal = '🥇';
                else if (index === 1) rankMedal = '🥈';
                else if (index === 2) rankMedal = '🥉';
                else rankMedal = `<span class="text-teal-700 bg-teal-100 rounded-full w-6 h-6 flex items-center justify-center text-xs font-black shadow-inner">${index + 1}</span>`;

                const displayName = usersProfile[stat.user]?.nickname || stat.user;

                html += `
                    <div onclick="openPublicProfile('${stat.user}')" class="bg-white rounded-xl p-2.5 border border-teal-100 shadow-sm flex items-center gap-3 relative hover:scale-[1.02] transition-transform cursor-pointer hover:border-teal-300">
                        <div class="text-2xl w-8 flex justify-center drop-shadow-sm">${rankMedal}</div>
                        <div class="flex-1 min-w-0 flex items-center gap-2">
                            <div class="${getUserColor(stat.user)} w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-sm flex-shrink-0">
                                ${getAvatarChar(stat.user)}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="font-black text-gray-700 text-sm mb-0.5 truncate">${displayName}</div>
                                <div class="text-[10px] text-gray-500 flex gap-2">
                                    <span class="text-rose-500 font-bold bg-rose-50 px-1.5 rounded">A++ x ${stat.aPlusPlus}</span>
                                    <span class="text-orange-500 font-bold bg-orange-50 px-1.5 rounded">A+ x ${stat.aPlus}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-center bg-gray-50 p-1.5 rounded-lg border border-gray-100 shrink-0">
                            <div class="text-[10px] text-gray-400 font-bold">總刷題</div>
                            <div class="font-black text-teal-600 text-base leading-none">${stat.totalEntries}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        window.renderMainContent = () => {
            if(window.renderCalendar) window.renderCalendar();
            if(window.renderTimeline) window.renderTimeline();
            if(window.renderLeaderboard) window.renderLeaderboard();
            if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminUsers();
        };

        // ==========================================
        //  輸入成績邏輯 (全面升級版 5 Steps)
        // ==========================================
        window.openScoreModal = (dateStr) => {
            modalState = { date: dateStr, mainSubject: '', textbook: '', subSubject: '', grade: '', photoBase64: '' };
            document.getElementById('modal-date').innerText = dateStr;
            
            // 狀態還原
            SUBJECTS.forEach(s => { 
                const el = document.getElementById(`btn-sub-${s}`);
                if (el) el.classList.remove('bg-teal-500', 'text-white'); 
            });
            GRADES.forEach(g => { 
                const el = document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`);
                if (el) el.classList.remove('bg-rose-500', 'text-white'); 
            });
            
            // 隱藏 2~5 步驟
            document.getElementById('step-2-container').classList.add('hidden');
            document.getElementById('step-3-container').classList.add('hidden');
            document.getElementById('step-4-container').classList.add('hidden');
            document.getElementById('step-5-container').classList.add('hidden');
            
            document.getElementById('photo-upload').value = '';
            document.getElementById('photo-preview-container').classList.add('hidden');
            document.getElementById('photo-preview-container').classList.remove('flex');
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('btn-delete-grade').classList.add('hidden');
            
            openGlobalModal('score-modal');
        };

        window.selectSubject = (sub) => {
            modalState.mainSubject = sub;
            modalState.textbook = '';
            modalState.subSubject = '';
            modalState.grade = '';

            // 按鈕高亮
            SUBJECTS.forEach(s => {
                const el = document.getElementById(`btn-sub-${s}`);
                if(el) {
                    if(s === sub) el.classList.add('bg-teal-500', 'text-white');
                    else el.classList.remove('bg-teal-500', 'text-white');
                }
            });
            GRADES.forEach(g => { 
                const el = document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`);
                if (el) el.classList.remove('bg-rose-500', 'text-white'); 
            });

            // 流程控制
            const step2 = document.getElementById('step-2-container');
            const step3 = document.getElementById('step-3-container');
            const step4 = document.getElementById('step-4-container');
            const step5 = document.getElementById('step-5-container');

            step2.classList.add('hidden');
            step3.classList.add('hidden');
            step4.classList.add('hidden');
            step5.classList.add('hidden');

            if (TEXTBOOKS[sub]) {
                // 有定義教科書，跳轉 Step 2
                step2.classList.remove('hidden');
                document.getElementById('textbook-selector').innerHTML = TEXTBOOKS[sub].map(tb => `
                    <div onclick="selectTextbook('${tb.id}')" id="btn-tb-${tb.id}" class="cursor-pointer border-4 border-transparent hover:border-blue-400 rounded-xl p-2 text-center transition-all bg-white shadow-sm w-32 md:w-36 group">
                        <img src="${tb.img}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2YxZjVmOSIvPjx0ZXh0IHg9IjUwIiB5PSI1MCIgZm9udC1zaXplPSIxMiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgYWxpZ25tZW50LWJhc2VsaW5lPSJtaWRkbGUiIGZpbGw9IiM5Y2EzYWYiPueEoeWcluAHfTwvdGV4dD48L3N2Zz4='" class="w-full h-32 md:h-36 object-cover rounded-lg mb-2 shadow-sm border border-gray-200 pointer-events-none group-hover:shadow-md transition-shadow">
                        <div class="font-bold text-sm text-gray-700 pointer-events-none">${tb.name}</div>
                    </div>
                `).join('');
            } else if (SUB_SUBJECTS[sub]) {
                // 有定義細項 (如自然、社會)，跳轉 Step 3
                step3.classList.remove('hidden');
                document.getElementById('sub-subject-selector').innerHTML = SUB_SUBJECTS[sub].map(sItem => 
                    `<button onclick="selectSubSubject('${sItem}')" id="btn-subitem-${sItem}" class="block w-full text-left py-3 px-4 rounded-xl border-2 border-indigo-200 text-indigo-700 font-bold hover:bg-indigo-50 transition-colors bg-white shadow-sm text-sm md:text-base hover:scale-[1.02] whitespace-nowrap overflow-hidden text-ellipsis">${formatStep3Text(sItem)}</button>`
                ).join('');
                
                // 自動預選第一個或舊有的
                let subToSelect = SUB_SUBJECTS[sub][0];
                for (let sItem of SUB_SUBJECTS[sub]) {
                    if (allGrades[username] && allGrades[username][modalState.date] && allGrades[username][modalState.date][sItem]) {
                        subToSelect = sItem; break;
                    }
                }
                window.selectSubSubject(subToSelect);
            } else {
                // 只有主科 (如英文、數學)，直接跳轉 Step 4 & 5
                modalState.subSubject = sub;
                step4.classList.remove('hidden');
                step5.classList.remove('hidden');
                checkExistingGrade(sub);
            }
        };

        window.selectTextbook = (tbId) => {
            modalState.textbook = tbId;
            modalState.subSubject = '';
            
            // Highlight
            const tbs = TEXTBOOKS[modalState.mainSubject];
            if(tbs) {
                tbs.forEach(tb => {
                    const el = document.getElementById(`btn-tb-${tb.id}`);
                    if(el) {
                        if(tb.id === tbId) el.classList.replace('border-transparent', 'border-blue-500');
                        else el.classList.replace('border-blue-500', 'border-transparent');
                    }
                });
            }

            // Show Step 3
            document.getElementById('step-3-container').classList.remove('hidden');
            const tbObj = tbs.find(t => t.id === tbId);
            if(tbObj && tbObj.chapters) {
                document.getElementById('sub-subject-selector').innerHTML = tbObj.chapters.map((ch, idx) => 
                    `<button onclick="selectSubSubject('${ch}', ${idx})" id="btn-subitem-${idx}" class="block w-full text-left py-3 px-4 rounded-xl border-2 border-indigo-200 text-indigo-700 font-bold hover:bg-indigo-50 transition-colors bg-white shadow-sm text-sm md:text-base hover:scale-[1.02] whitespace-nowrap overflow-hidden text-ellipsis">${formatStep3Text(ch)}</button>`
                ).join('');
            }
            
            // Hide 4 & 5 until chapter selected
            document.getElementById('step-4-container').classList.add('hidden');
            document.getElementById('step-5-container').classList.add('hidden');
        };

        window.selectSubSubject = (subItem, indexId = null) => {
            modalState.subSubject = subItem;
            
            // Highlight
            if (TEXTBOOKS[modalState.mainSubject] && indexId !== null) {
                const tbObj = TEXTBOOKS[modalState.mainSubject].find(t => t.id === modalState.textbook);
                if (tbObj && tbObj.chapters) {
                    tbObj.chapters.forEach((_, idx) => {
                        const el = document.getElementById(`btn-subitem-${idx}`);
                        if(el) {
                            if(idx === indexId) el.classList.add('bg-indigo-500', 'text-white');
                            else el.classList.remove('bg-indigo-500', 'text-white');
                        }
                    });
                }
            } else if (SUB_SUBJECTS[modalState.mainSubject]) {
                SUB_SUBJECTS[modalState.mainSubject].forEach(s => {
                    const el = document.getElementById(`btn-subitem-${s}`);
                    if (el) {
                        if(s === subItem) el.classList.add('bg-indigo-500', 'text-white');
                        else el.classList.remove('bg-indigo-500', 'text-white');
                    }
                });
            }

            // Show Step 4 & 5
            document.getElementById('step-4-container').classList.remove('hidden');
            document.getElementById('step-5-container').classList.remove('hidden');
            
            checkExistingGrade(subItem);

            // 自動平滑滾動到 Step 4
            setTimeout(() => {
                const step4Container = document.getElementById('step-4-container');
                if(step4Container) {
                    step4Container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

        const checkExistingGrade = (subKey) => {
            let existing = (allGrades[username] && allGrades[username][modalState.date] && allGrades[username][modalState.date][subKey]) ? allGrades[username][modalState.date][subKey] : null;

            if (existing) {
                window.selectGrade(existing.grade);
                if (existing.photo) setPhotoPreview(existing.photo);
                else {
                     modalState.photoBase64 = '';
                     document.getElementById('photo-preview-container').classList.add('hidden');
                     document.getElementById('photo-preview-container').classList.remove('flex');
                     document.getElementById('photo-placeholder').classList.remove('hidden');

                });

                document.getElementById('photo-preview-container').classList.remove('flex');
                document.getElementById('photo-placeholder').classList.remove('hidden');
                document.getElementById('btn-delete-grade').classList.add('hidden');
            }
        };

        window.selectGrade = (grade) => {
            modalState.grade = grade;
            GRADES.forEach(g => {
                const el = document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`);
                if(el) {
                    if(g === grade) el.classList.add('bg-rose-500', 'text-white');
                    else el.classList.remove('bg-rose-500', 'text-white');
                }
            });
        };

        window.handlePhotoUpload = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    setPhotoPreview(base64);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        const setPhotoPreview = (base64) => {
            modalState.photoBase64 = base64;
            const preview = document.getElementById('photo-preview');
            preview.src = base64;
            document.getElementById('photo-placeholder').classList.add('hidden');
            document.getElementById('photo-preview-container').classList.remove('hidden');
            document.getElementById('photo-preview-container').classList.add('flex');
        };

        window.saveGrade = async () => {
            if(!modalState.subSubject) return alert("請完整選擇科目與章節細項！");

            try {
                // 將成績獨立儲存為一個 Document，ID 命名規則為: 帳號_日期_科目細項
                const docId = `${username}_${modalState.date}_${modalState.subSubject}`;
                const gradeRef = doc(db, 'artifacts', appId, 'public', 'data', 'Grades', docId);
                
                await setDoc(gradeRef, {
                    user: username,
                    date: modalState.date,
                    mainSubject: modalState.mainSubject,
                    subSubject: modalState.subSubject,
                    grade: modalState.grade,
                    photo: modalState.photoBase64 || null,
                    updatedAt: new Date().toISOString() 
                });
                
                closeGlobalModal('score-modal');

                console.error(e);
                alert("儲存失敗，請確認圖片是否過大！");

        window.deleteGradeRecord = async () => {
            if(!modalState.subSubject) return;
            if(!confirm(`確定要刪除 ${modalState.date} 的 ${modalState.subSubject} 紀錄嗎？`)) return;

            try {
                const docId = `${username}_${modalState.date}_${modalState.subSubject}`;
                const gradeRef = doc(db, 'artifacts', appId, 'public', 'data', 'Grades', docId);
                await deleteDoc(gradeRef);

                closeGlobalModal('score-modal');
            } catch(e) { console.error(e); }
        };

        window.viewOthersScore = (e, otherUser, dateStr) => {
            if (e) e.stopPropagation(); 
            const data = (allGrades[otherUser] && allGrades[otherUser][dateStr]) ? allGrades[otherUser][dateStr] : null;
            if(!data || Object.keys(data).length === 0) {
                alert(`${usersProfile[otherUser]?.nickname || otherUser} 在 ${dateStr} 尚未登錄成績！`);
                return; 
            }
            
            document.getElementById('view-modal-date').innerText = dateStr;
            let contentHtml = `
                <div class="flex items-center gap-3 mb-4 border-b-2 border-teal-200 pb-3">
                    <div class="${getUserColor(otherUser)} w-10 h-10 rounded-full flex items-center justify-center text-lg font-black shadow-sm">
                        ${getAvatarChar(otherUser)}
                    </div>
                    <h3 class="font-black text-xl text-teal-800">${usersProfile[otherUser]?.nickname || otherUser} 的戰果</h3>
                </div>
            `;
            
            Object.entries(data).forEach(([subKey, item]) => {
                const mainSub = item.mainSubject || subKey;
                const subColor = getSubjectColor(mainSub);
                contentHtml += `
                    <div class="mb-5 bg-white p-4 rounded-2xl shadow-sm border ${subColor.border} ${subColor.bg}">
                        <div class="flex justify-between items-start mb-2 ${subColor.text} gap-2">
                            <span class="font-bold text-base md:text-lg whitespace-pre-line leading-tight pt-1">📌 ${subKey}</span>
                            <span class="font-black text-xl md:text-2xl shrink-0">${item.grade}</span>
                        </div>
                        ${item.photo ? `<div class="mt-3"><img src="${item.photo}" class="w-full rounded-xl border border-gray-200 shadow-sm" alt="考卷照片"></div>` : '<div class="text-xs text-gray-400 text-center mt-2">（無附照片）</div>'}
                    </div>
                `;
            });
            document.getElementById('view-score-content').innerHTML = contentHtml;
            openGlobalModal('view-score-modal');
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2026-09-09', title: '第1次模擬考' },
                        { date: '2026-10-13', title: '第1次段考' },
                        { date: '2026-10-28', title: '第2次模擬考' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
                if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminDates();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            const gradesCol = collection(db, 'artifacts', appId, 'public', 'data', 'Grades');
            if(unsubGrades) unsubGrades();
            unsubGrades = onSnapshot(gradesCol, (snap) => {
                let newAllGrades = {};
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if(!data.user || !data.date || !data.subSubject) return; 
                    
                    if(!newAllGrades[data.user]) newAllGrades[data.user] = {};
                    if(!newAllGrades[data.user][data.date]) newAllGrades[data.user][data.date] = {};
                    
                    newAllGrades[data.user][data.date][data.subSubject] = {
                        mainSubject: data.mainSubject || '',
                        grade: data.grade,
                        photo: data.photo || null,
                        updatedAt: data.updatedAt || ''
                    };
                });
                allGrades = newAllGrades;
                if(username) window.renderMainContent();
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();

    </script>
</body>
</html>
