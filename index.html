                if(inner && inner.classList.contains('scale-95')) inner.classList.remove('scale-95');
            }, 10);
        };

        window.closeGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.add('opacity-0');
            const inner = modal.firstElementChild;
            if(inner && inner.classList.contains('scale-95') === false) inner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');

        window.openProgressModal = () => {
            const targetUser = viewingUser === 'ALL' ? username : viewingUser;
            if (!targetUser) return;
            const dispName = usersProfile[targetUser]?.nickname || targetUser;
            document.getElementById('progress-user-name').innerText = `📈 ${dispName} 的闖關進度`;

            const uGrades = allGrades[targetUser] || {};
            
            const getBestGrade = (subKey) => {
                let bestObj = null;
                let bestW = 0;
                Object.entries(uGrades).forEach(([dateStr, dayData]) => {
                    if(dayData[subKey]) {
                        const g = dayData[subKey].grade;
                        const w = GRADE_WEIGHT[g] || 0;
                        if(w > bestW) {
                            bestW = w;
                            bestObj = { grade: g, date: dateStr, isWeakness: dayData[subKey].isWeakness };
                        }
                    }
                });
                return bestObj;
            };

            const renderGradeBadge = (bestObj) => {
                if(!bestObj) return `<div class="bg-gray-200 text-gray-400 text-[10px] sm:text-xs py-1.5 px-1 rounded font-bold mx-auto w-full text-center">無紀錄</div>`;
                const grade = bestObj.grade;
                const isA = grade.includes('A');
                const borderColor = isA ? 'border-red-500 text-red-500' : 'border-orange-500 text-orange-500';
                const bgColor = isA ? 'bg-red-50' : 'bg-orange-50';
                return `<div class="${bgColor} ${borderColor} border text-[11px] sm:text-sm py-1.5 px-1 rounded-sm font-black mx-auto w-full text-center shadow-sm">${grade}</div>`;
            };

            const buildHorizontalTable = (title, imgSrc, chapters, subjectKeyFn) => {
                const formatChapterHtml = (ch) => {
                    if (ch.includes('會考模擬試題')) return `<div class="step3-color-exam font-black text-center w-full text-[11px] sm:text-xs leading-tight whitespace-pre-line flex items-center justify-center h-full">${ch.replace(' ', '\n')}</div>`;
                    let line1 = '', line2 = '', line3 = '';
                    const parts = ch.split(' ');
                    if (parts.length >= 2 && parts[0].startsWith('單元')) {
                        line1 = parts[0]; line2 = parts[1]; line3 = parts.slice(2).join(' ');
                    } else if (parts.length >= 2 && parts[0].includes('會考模擬試題')) {
                        line1 = parts[0]; line2 = parts.slice(1).join(' ');
                    }
                    if (line1) {
                        let html = `<div class="text-[#DC143C] text-[12px] sm:text-[14px] font-black mb-0.5 leading-tight w-full text-center">${line1}</div>`;
                        html += `<div class="text-[#0066FF] text-[11px] sm:text-xs font-black mb-0.5 leading-tight w-full text-center">${line2}</div>`;
                        if (line3) html += `<div class="text-[10px] sm:text-[11px] text-gray-700 font-bold leading-tight whitespace-pre-line w-full text-center">${line3}</div>`;
                        return html;
                    }
                    return `<div class="text-[10px] sm:text-xs text-gray-700 font-bold leading-tight whitespace-pre-line w-full text-center flex items-center justify-center h-full">${ch}</div>`;
                };

                let tableHtml = `
                <div class="overflow-x-auto custom-scrollbar pb-3 relative">
                    <div class="inline-flex min-w-full border-2 border-gray-300 rounded-xl bg-white shadow-sm">
                        <div class="w-28 sm:w-36 flex flex-col items-center justify-center p-2 border-r-2 border-gray-300 bg-gray-50 shrink-0 sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] rounded-l-xl">
                            <div class="font-black text-xs sm:text-sm text-center mb-2 text-gray-800 whitespace-pre-line leading-relaxed">${title}</div>
                            ${imgSrc ? `<img src="${imgSrc}" class="w-16 h-24 sm:w-20 sm:h-28 object-cover shadow-sm border border-gray-200 rounded" onerror="this.style.display='none'">` : '<div class="text-3xl sm:text-4xl opacity-40 my-2">📚</div>'}
                        </div>
                        <div class="flex flex-row divide-x-2 divide-gray-200">
                `;
                chapters.forEach(ch => {
                    const queryKey = subjectKeyFn(ch);
                    const bestObj = getBestGrade(queryKey);
                    
                    const isWeakness = Object.values(uGrades).some(dayData => dayData[queryKey] && dayData[queryKey].isWeakness);
                    const cursorClass = bestObj ? 'cursor-pointer hover:bg-gray-100 hover:shadow-inner' : 'hover:bg-gray-50';
                    const wrapperClass = isWeakness ? 'border-2 border-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)] relative z-10 scale-[1.02]' : '';
                    const fireBadge = isWeakness ? '<div class="absolute -top-3 -right-2 text-xl drop-shadow-md z-20 animate-bounce-slow" title="弱點！">🔥</div>' : '';
                    
                    const clickAttr = bestObj ? `onclick="viewOthersScore(event, '${targetUser}', '${bestObj.date}')"` : '';
                    
                    tableHtml += `
                            <div ${clickAttr} class="w-24 sm:w-32 flex flex-col items-center justify-start p-2 shrink-0 bg-white transition-colors relative ${cursorClass} ${wrapperClass}">
                                ${fireBadge}
                                <div class="w-full h-auto min-h-[4rem] flex flex-col items-center justify-center mb-2">
                                    ${formatChapterHtml(ch)}
                                </div>
                                <div class="w-full mt-auto pb-1 px-1">
                                    ${renderGradeBadge(bestObj)}
                                </div>
                            </div>
                    `;
                });
                tableHtml += `</div></div></div>`;
                return tableHtml;
            };

            let html = '<div class="space-y-6">';
            html += buildHorizontalTable('國文\n(麻辣講義)', 'images/c1.jpg', CHINESE_CHAPTERS, (ch) => ch);
            html += buildHorizontalTable('英文\n(超會考)', 'images/e1.jpg', ENGLISH_CHAPTERS, (ch) => ch);
            html += buildHorizontalTable('數學\n(麻辣講義)', 'images/m1.jpg', MATH_CHAPTERS, (ch) => ch);
            html += buildHorizontalTable('生物\n(麻辣講義)', 'images/b1.jpg', BIO_CHAPTERS, (ch) => ch);
            html += buildHorizontalTable('生物\n(大滿貫)', 'images/b2.jpg', BIO_CHAPTERS_2, (ch) => ch);
            html += buildHorizontalTable('理化\n(大滿貫)', 'images/p1.jpg', PHY_CHAPTERS, (ch) => ch);
            html += buildHorizontalTable('歷史\n(大滿貫)', 'images/h1.jpg', HISTORY_CHAPTERS, (ch) => ch);
            html += buildHorizontalTable('自然合科', null, SUB_SUBJECTS['自然'], (sub) => sub);
            html += buildHorizontalTable('社會合科', null, SUB_SUBJECTS['社會'], (sub) => sub);
            html += '</div>';

            document.getElementById('progress-content').innerHTML = html;
            openGlobalModal('progress-modal');
        };

        window.openWeaknessModal = () => {
            const userToView = viewingUser === 'ALL' ? username : viewingUser;
            if (!userToView) return;

            const dispName = usersProfile[userToView]?.nickname || userToView;
            document.getElementById('weakness-modal-title').innerText = `🔥 ${dispName} 的弱點集中營`;

            const uGrades = allGrades[userToView] || {};
            let weaknesses = [];
            
            Object.entries(uGrades).forEach(([dateStr, subjects]) => {
                Object.entries(subjects).forEach(([subKey, info]) => {
                    if (info.isWeakness) weaknesses.push({ date: dateStr, subSubject: subKey, ...info });
                });
            });

            weaknesses.sort((a, b) => new Date(b.date) - new Date(a.date));

            const container = document.getElementById('weakness-content');

                container.innerHTML = `<div class="text-center text-gray-400 py-10"><div class="text-5xl mb-3">🎉</div><h3 class="text-xl font-bold">太棒了！目前沒有未解決的弱點！</h3></div>`;

                    const resolveBtnHtml = userToView === username ? 
                        `<div class="mt-4 flex justify-end border-t border-red-100 pt-3">

                    return `
                        <div class="bg-white border-l-4 border-red-500 p-4 rounded-xl shadow-sm mb-4 border border-y-red-100 border-r-red-100 relative overflow-hidden">

                                    <h4 class="font-black text-gray-800 mt-2 text-lg md:text-xl">📌 [${mainSub}] ${w.subSubject}</h4>
                                </div>
                                <span class="font-black text-3xl ${subColor.text} mt-2 mr-2 drop-shadow-sm">${w.grade}</span>
                            </div>
                            ${w.weaknessNote ? `<div class="mt-3 bg-yellow-50 p-3 rounded-lg text-sm text-gray-800 border border-yellow-200 shadow-inner"><strong class="text-yellow-700 block mb-1">📝 筆記 / 盲點反思：</strong>${w.weaknessNote.replace(/\n/g, '<br>')}</div>` : ''}
                            ${w.photo ? `<div class="mt-3 bg-gray-50 p-2 rounded-lg border border-gray-200"><img src="${w.photo}" class="w-full max-h-64 object-contain rounded-lg shadow-sm cursor-pointer hover:opacity-90 transition-opacity" onclick="window.open(this.src)"></div>` : ''}
                            ${resolveBtnHtml}
                        </div>
                    `;
                }).join('');
            }
            openGlobalModal('weakness-modal');
        };

        window.resolveWeakness = async (dateStr, subKey) => {
            if(!confirm("太棒了！確定已經完全搞懂這個章節，要解除弱點標記嗎？")) return;
            try {
                const docId = `${username}_${dateStr}_${subKey}`;
                const gradeRef = doc(db, 'artifacts', appId, 'public', 'data', 'Grades', docId);
                await setDoc(gradeRef, { isWeakness: false }, { merge: true });

                    const MAX_WIDTH = 600; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    newAllGrades[data.user][data.date][data.subSubject] = {
                        mainSubject: data.mainSubject || '',
                        grade: data.grade,
                        photo: data.photo || null,
                        isWeakness: data.isWeakness || false,
                        weaknessNote: data.weaknessNote || '',
                        updatedAt: data.updatedAt || ''
                    };
                });
                allGrades = newAllGrades;
                if(username) window.renderMainContent();
            }, errHandler);
        };

        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    const data = snap.data().users;
                    globalUsers = Array.isArray(data) ? data : (data ? Object.values(data) : []);
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) usersProfile = snap.data().profiles || {};
                else usersProfile = {};
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();

    </script>
</body>
</html>
