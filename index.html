        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        /* 垂直跑馬燈效果設定 */
        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {

        window.openGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const inner = modal.firstElementChild;
                if(inner.classList.contains('scale-95')) {
                    inner.classList.remove('scale-95');
                }
            }, 10);
        };

        window.closeGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.add('opacity-0');
            const inner = modal.firstElementChild;
            if(inner && inner.classList.contains('scale-95') === false) {
                inner.classList.add('scale-95');
            }
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        // ==========================================
        //  🗓️ 我的計畫表 (Drag & Drop) 邏輯
        // ==========================================
        window.openPlanModal = () => {
            planYear = new Date().getFullYear();
            planMonth = new Date().getMonth();
            document.getElementById('plan-subject-select').value = '';
            document.getElementById('plan-chapters-container').innerHTML = `
                <div class="text-center text-sky-400 text-sm mt-4 font-bold flex flex-col items-center justify-center h-full">
                    <div class="text-4xl mb-2 opacity-50">📚</div>
                    <div>請先選擇科目</div>
                </div>`;
            window.renderPlanCalendar();
            openGlobalModal('plan-modal');
        };

        window.changePlanMonth = (delta) => {
            planMonth += delta;
            if(planMonth > 11) { planMonth = 0; planYear++; }
            if(planMonth < 0) { planMonth = 11; planYear--; }
            window.renderPlanCalendar();
        };

        window.renderPlanChapters = (subject) => {
            const container = document.getElementById('plan-chapters-container');
            if(!subject) {
                container.innerHTML = `
                    <div class="text-center text-sky-400 text-sm mt-4 font-bold flex flex-col items-center justify-center h-full">
                        <div class="text-4xl mb-2 opacity-50">📚</div>
                        <div>請先選擇科目</div>
                    </div>`;
                return;
            }
            let chapters = [];
            if(TEXTBOOKS[subject]) {
                TEXTBOOKS[subject].forEach(tb => {
                    chapters = chapters.concat(tb.chapters);
                });
            } else if (SUB_SUBJECTS[subject]) {
                chapters = SUB_SUBJECTS[subject];
            } else {
                chapters = [subject]; // 若無細項則直接顯示科目名稱
            }
            
            chapters = [...new Set(chapters)]; // 移除重複

            container.innerHTML = chapters.map(ch => `
                <div draggable="true" ondragstart="handleDragStart(event, '${subject}', '${ch}')" 
                     class="bg-white border-2 border-dashed border-sky-300 p-2 mb-2 rounded-xl cursor-grab hover:bg-sky-50 hover:border-sky-500 shadow-sm text-sm font-bold text-gray-700 active:cursor-grabbing transition-colors flex items-center group">
                    <span class="text-xl inline-block mr-2 group-hover:scale-110 transition-transform">🖐️</span> 
                    <div class="flex-1 pointer-events-none">${formatStep3Text(ch)}</div>
                </div>
            `).join('');
        };

        window.handleDragStart = (e, subject, chapter) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({ subject, chapter }));
            e.dataTransfer.effectAllowed = 'copy';
        };

        window.handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            e.currentTarget.classList.add('bg-sky-100', 'border-sky-400');
        };
        
        window.handleDragLeave = (e) => {
            e.currentTarget.classList.remove('bg-sky-100', 'border-sky-400');
        };

        window.handleDrop = async (e, dateStr) => {
            e.preventDefault();
            e.currentTarget.classList.remove('bg-sky-100', 'border-sky-400');
            const dataStr = e.dataTransfer.getData('text/plain');
            if(!dataStr) return;
            try {
                const data = JSON.parse(dataStr);
                const docId = `${username}_${dateStr}_${data.chapter}`;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Plans', docId), {
                    user: username,
                    date: dateStr,
                    mainSubject: data.subject,
                    subSubject: data.chapter,
                    createdAt: new Date().toISOString()
                });
            } catch (err) {
                console.error("排定計畫失敗:", err);
            }
        };

        window.deletePlan = async (dateStr, chapter) => {
            if(!confirm('確定要移除此計畫嗎？')) return;
            const docId = `${username}_${dateStr}_${chapter}`;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Plans', docId));
        };

        window.renderPlanCalendar = () => {
            document.getElementById('plan-month-title').innerText = `${planYear} 年 ${planMonth + 1} 月`;
            const container = document.getElementById('plan-calendar-container');
            const daysInMonth = new Date(planYear, planMonth + 1, 0).getDate();
            const todayStr = formatDate(new Date());

            let html = '';
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${planYear}-${String(planMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dateObj = new Date(planYear, planMonth, d);
                const dayOfWeek = ['日','一','二','三','四','五','六'][dateObj.getDay()];
                const isToday = dateStr === todayStr;
                const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;

                let dayPlansHTML = '';
                if(allPlans[username] && allPlans[username][dateStr]) {
                    Object.values(allPlans[username][dateStr]).forEach(plan => {
                        // 檢查該計畫是否已經在 Grades 中有成績紀錄
                        const isCompleted = allGrades[username] && allGrades[username][dateStr] && allGrades[username][dateStr][plan.subSubject];
                        
                        dayPlansHTML += `
                            <div class="relative group bg-white border-2 ${isCompleted ? 'border-solid border-green-400 bg-green-50 shadow-md' : 'border-dashed border-sky-400 hover:border-sky-500'} p-2 rounded-xl text-xs font-bold text-gray-700 shadow-sm transition-all mb-2 flex items-center">
                                <div class="w-full">
                                    ${plan.mainSubject !== plan.subSubject ? `<div class="text-sky-500 mb-0.5 scale-90 origin-left">[${plan.mainSubject}]</div>` : ''}
                                    <div class="whitespace-normal leading-tight">${formatStep3Text(plan.subSubject)}</div>
                                </div>
                                ${isCompleted ? '<div class="absolute -top-2 -right-2 text-xl drop-shadow-md bg-white rounded-full">🎯</div>' : ''}
                                <button onclick="deletePlan('${dateStr}', '${plan.subSubject}')" class="absolute hidden group-hover:flex -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 items-center justify-center font-bold shadow-md hover:bg-red-600 transition-colors z-10 text-[10px]">✕</button>
                            </div>
                        `;
                    });
                }

                html += `
                    <div class="min-w-[150px] md:min-w-[170px] max-w-[200px] bg-white border-2 ${isToday ? 'border-teal-400' : 'border-sky-100'} rounded-2xl flex flex-col overflow-hidden shrink-0 shadow-sm transition-colors"
                         ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, '${dateStr}')">
                        <div class="${isToday ? 'bg-teal-400 text-white' : isWeekend ? 'bg-rose-50 text-rose-500' : 'bg-sky-50 text-sky-700'} p-2 text-center font-black border-b border-gray-100 shrink-0 shadow-sm flex justify-between items-center px-3">
                            <span class="text-lg">${String(d).padStart(2,'0')}</span>
                            <span class="text-xs opacity-80">${dayOfWeek}</span>
                        </div>
                        <div class="flex-1 p-2 overflow-y-auto custom-scrollbar flex flex-col transition-colors min-h-[200px] ${!dayPlansHTML ? 'justify-center' : ''}">
                            ${dayPlansHTML || '<div class="text-center text-gray-300 text-xs font-bold pointer-events-none opacity-60"><div class="text-2xl mb-1">📥</div>拖曳至此排定</div>'}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        };


        // ==========================================
        //  進度追蹤 Modal 邏輯
        // ==========================================
        window.openProgressModal = () => {
            const targetUser = viewingUser === 'ALL' ? username : viewingUser;
            if (!targetUser) return;
            const dispName = usersProfile[targetUser]?.nickname || targetUser;
            document.getElementById('progress-user-name').innerText = `📈 ${dispName} 的闖關進度`;

            const uGrades = allGrades[targetUser] || {};
            
            const getBestGrade = (subKey) => {
                let bestObj = null;
                let bestW = 0;

                Object.entries(uGrades).forEach(([dateStr, dayData]) => {
                    if(dayData[subKey]) {
                        const g = dayData[subKey].grade;
                        const w = GRADE_WEIGHT[g] || 0;
                        if(w > bestW) {
                            bestW = w;
                            // 檢查這筆成績的日期是否有事先安排在計畫表內

            let subjectDetails = {};

                    const actualSub = analysisSubjects.includes(subKey) ? subKey : (analysisSubjects.includes(item.mainSubject) ? item.mainSubject : null);

                                feed.push({ type: 'lag', user: u, date: d, subject: s, mainSubject: plan.mainSubject, updatedAt: d + 'T23:59:59Z' });
                            }
                        }
                    });
                });
            });

            feed.sort((a,b) => {
                const timeA = a.updatedAt ? new Date(a.updatedAt) : new Date(a.date);
                const timeB = b.updatedAt ? new Date(b.updatedAt) : new Date(b.date);
                return timeB - timeA; // 新的在上面
            });

            if (feed.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-70"><div class="text-4xl mb-2">🍃</div><div class="text-sm font-bold">尚無戰況紀錄，趕快安排計畫！</div></div>`;
                return;
            }

            let html = '';
            feed.forEach(item => {
                const displayName = usersProfile[item.user]?.nickname || item.user;
                const isMe = item.user === username;
                
                if (item.type === 'lag') {
                    const fullSubStr = `${item.mainSubject && item.mainSubject !== item.subject ? '['+item.mainSubject+'] ' : ''}${item.subject}`;
                    html += `
                        <div class="p-3 rounded-2xl border-2 border-red-300 bg-red-50 shadow-sm relative group hover:-translate-y-1 hover:shadow-md transition-all">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-red-700 bg-white px-2 py-0.5 rounded shadow-sm text-xs border border-red-100 flex items-center gap-1.5">
                                    <div class="w-3 h-3 rounded-full flex items-center justify-center text-[8px] ${getUserColor(item.user)}">${getAvatarChar(item.user)}</div>
                                    ${isMe ? '我' : displayName}
                                </span>
                                <span class="text-[10px] text-red-400 font-mono">${item.date}</span>
                            </div>
                            <div class="text-sm text-red-600 font-bold mt-1.5">
                                ⚠️ 你落後了！計畫 <span class="text-red-800 break-all" title="${fullSubStr}">${fullSubStr.length > 20 ? fullSubStr.substring(0,18)+'...' : fullSubStr}</span> 尚未完成！
                            </div>
                        </div>
                    `;
                } else {
                    const isA = item.grade.includes('A');
                    let emoji = isA ? '🏆' : '💪';
                    const mainSub = item.mainSubject || item.subject;
                    const subColor = getSubjectColor(mainSub);
                    const mainSubStr = item.mainSubject && item.mainSubject !== item.subject ? `${item.mainSubject} ` : '';
                    const fullSubStr = `${mainSubStr}${item.subject}`;
                    
                    const isAchieved = allPlans[item.user] && allPlans[item.user][item.date] && allPlans[item.user][item.date][item.subject];
                    if (isAchieved) emoji = '🎯 ' + emoji;

                    html += `
                        <div class="p-3 rounded-2xl border-2 ${subColor.border} ${subColor.bg} shadow-sm relative group cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all" onclick="window.viewOthersScore(null, '${item.user}', '${item.date}')">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-gray-700 bg-white px-2 py-0.5 rounded shadow-sm text-xs border border-gray-100 flex items-center gap-1.5">
                                    <div class="w-3 h-3 rounded-full flex items-center justify-center text-[8px] ${getUserColor(item.user)}">${getAvatarChar(item.user)}</div>
                                    ${isMe ? '我' : displayName}
                                </span>
                                <span class="text-[10px] text-gray-400 font-mono">${item.date}</span>
                            </div>
                            <div class="text-sm text-gray-600 mt-1">
                                在 <span class="font-bold text-gray-800" title="${fullSubStr}">${fullSubStr.length > 20 ? fullSubStr.substring(0,18)+'...' : fullSubStr}</span> 獲得 <span class="font-black text-lg mx-1 ${subColor.text}">${item.grade}</span> ${emoji}
                            </div>
                            ${item.photo ? `<div class="absolute right-3 bottom-2 text-purple-400 text-lg opacity-40 group-hover:opacity-100 transition-opacity">📸</div>` : ''}
                        </div>
                    `;
                }
            });
            container.innerHTML = html;
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2026-09-09', title: '第1次模擬考' },
                        { date: '2026-10-13', title: '第1次段考' },
                        { date: '2026-10-28', title: '第2次模擬考' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
                if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminDates();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            const gradesCol = collection(db, 'artifacts', appId, 'public', 'data', 'Grades');
            if(unsubGrades) unsubGrades();
            unsubGrades = onSnapshot(gradesCol, (snap) => {
                let newAllGrades = {};
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if(!data.user || !data.date || !data.subSubject) return; 
                    
                    if(!newAllGrades[data.user]) newAllGrades[data.user] = {};
                    if(!newAllGrades[data.user][data.date]) newAllGrades[data.user][data.date] = {};
                    
                    newAllGrades[data.user][data.date][data.subSubject] = {
                        mainSubject: data.mainSubject || '',
                        grade: data.grade,
                        photo: data.photo || null,
                        updatedAt: data.updatedAt || ''
                    };
                });
                allGrades = newAllGrades;
                if(username) window.renderMainContent();
            }, errHandler);

            // 新增：Plans 計畫表集合監聽
            const plansCol = collection(db, 'artifacts', appId, 'public', 'data', 'Plans');
            if(unsubPlans) unsubPlans();
            unsubPlans = onSnapshot(plansCol, (snap) => {
                let newAllPlans = {};
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if(!data.user || !data.date || !data.subSubject) return; 
                    
                    if(!newAllPlans[data.user]) newAllPlans[data.user] = {};
                    if(!newAllPlans[data.user][data.date]) newAllPlans[data.user][data.date] = {};
                    
                    newAllPlans[data.user][data.date][data.subSubject] = {
                        mainSubject: data.mainSubject || '',
                        createdAt: data.createdAt || ''
                    };
                });
                allPlans = newAllPlans;
                if(username) window.renderMainContent();
                // 若計畫表 Modal 正在開啟中，則自動更新渲染
                if(!document.getElementById('plan-modal').classList.contains('hidden')) {
                    window.renderPlanCalendar();
                }
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();

    </script>
</body>
</html>
