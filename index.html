            document.getElementById('analysis-user-name').innerText = `👤 ${dispName} 的戰力分析`;
            
            const analysisSubjects = ['國文', '英文', '數學', '生物', '理化', '地科', '歷史', '地理', '公民'];
            const gradeToNum = (g) => {
                const map = { 'A++': 5, 'A+': 4, 'A': 3, 'B++': 2, 'B+': 1, 'B': 0, 'C': 0 };
                return map[g] !== undefined ? map[g] : null;
            };

            const uGrades = allGrades[targetUser] || {};
            let subjectTotals = {}; let subjectCounts = {}; let subjectDetails = {};

            analysisSubjects.forEach(sub => {
                subjectTotals[sub] = 0; subjectCounts[sub] = 0;
                subjectDetails[sub] = { 'A++':0, 'A+':0, 'A':0, 'B++':0, 'B+':0, 'B':0, 'C':0 };
            });

            Object.keys(uGrades).forEach(dateStr => {
                Object.keys(uGrades[dateStr]).forEach(sub => {
                    const gradeData = uGrades[dateStr][sub];
                    let targetRadarSub = null;
                    if (analysisSubjects.includes(sub)) targetRadarSub = sub; 
                    else if (analysisSubjects.includes(gradeData.mainSubject)) targetRadarSub = gradeData.mainSubject; 
                    
                    if (targetRadarSub) {
                        const grade = gradeData.grade; const num = gradeToNum(grade);
                        if (num !== null) {
                            subjectTotals[targetRadarSub] += num; subjectCounts[targetRadarSub] += 1;
                            if(subjectDetails[targetRadarSub][grade] !== undefined) subjectDetails[targetRadarSub][grade]++;
                        }
                    }
                });
            });

                            datasets: [{

                                backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: 'rgba(99, 102, 241, 1)',
                                pointBackgroundColor: 'rgba(99, 102, 241, 1)', pointBorderColor: '#fff',
                                pointHoverBackgroundColor: '#fff', pointHoverBorderColor: 'rgba(99, 102, 241, 1)',

                            plugins: {
                                legend: { display: false }, tooltip: { enabled: false },
                                datalabels: {
                                    color: '#4338ca', font: { family: 'Noto Sans TC', size: 14, weight: 'bold' },
                                    formatter: function(value, context) { const sub = context.chart.data.labels[context.dataIndex]; return sub + '\n' + value + ' 分'; },
                                    textAlign: 'center', align: 'end', anchor: 'end', offset: 5,
                                    listeners: {
                                        click: function(context) {
                                            const sub = context.chart.data.labels[context.dataIndex]; const details = subjectDetails[sub];
                                            if(!details) return;
                                            alert(`【${sub}】統計數據\nA++ : ${details['A++']}次\nA+ : ${details['A+']}次\nA : ${details['A']}次\nB++ : ${details['B++']}次\nB+ : ${details['B+']}次\nB : ${details['B']}次\nC : ${details['C']}次\n總計 : ${subjectCounts[sub]}次`);
                                            return true;
                                        }
                                    }
                                }
                            },
                            onClick: (e, elements) => {
                                if (elements.length > 0) {
                                    const sub = analysisSubjects[elements[0].index]; const details = subjectDetails[sub];
                                    if(!details) return;
                                    alert(`【${sub}】統計數據\nA++ : ${details['A++']}次\nA+ : ${details['A+']}次\nA : ${details['A']}次\nB++ : ${details['B++']}次\nB+ : ${details['B+']}次\nB : ${details['B']}次\nC : ${details['C']}次\n總計 : ${subjectCounts[sub]}次`);
                                }
                            }
                        }

                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    setPhotoPreview(canvas.toDataURL('image/jpeg', 0.6));

                img.src = event.target.result;

                const startPad = firstDay === 0 ? 6 : firstDay - 1;

                let html = `<div class="grid grid-cols-7 gap-1 md:gap-2 mb-2 shrink-0">`;
                ['一', '二', '三', '四', '五', '六', '日'].forEach((d, idx) => {
                    const isWeekend = idx >= 5;
                    html += `<div class="text-center font-bold ${isWeekend ? 'text-rose-500 bg-rose-50' : 'text-teal-700 bg-teal-50'} py-1 md:py-2 text-sm md:text-base rounded-lg md:rounded-xl shadow-sm border border-gray-100">${d}</div>`;
                });
                html += `</div><div class="grid grid-cols-7 gap-1 md:gap-2 flex-1 auto-rows-[100px] md:auto-rows-[120px] overflow-y-auto custom-scrollbar pb-4 pr-1 pl-1">`;

                for(let i=0; i<startPad; i++) {
                    html += `<div class="bg-white/30 rounded-xl md:rounded-2xl border border-transparent"></div>`;
                }

                const safeDates = Array.isArray(importantDates) ? importantDates : [];
                const safeGrades = allGrades || {};

                for(let d=1; d<=daysInMonth; d++) {
                    const dateStr = `${currentYear}-${padZ(currentMonth+1)}-${padZ(d)}`;
                    const isToday = dateStr === formatDate(new Date());
                    const isImportant = safeDates.find(i => i && i.date === dateStr);
                    
                    let usersWithDataToday = [];
                    Object.entries(safeGrades).forEach(([u, dates]) => {
                        if (dates && dates[dateStr] && Object.keys(dates[dateStr]).length > 0) {
                            if (viewingUser === 'ALL' || u === viewingUser) usersWithDataToday.push(u);
                        }
                    });
                    
                    let cellContent = '';
                    const buildBadge = (subKey, info, prefix = '') => {
                        let subColor = getSubjectColor(subKey);
                        let shortName = subKey;
                        if(subKey === '自然合科') shortName = '自';
                        else if(subKey === '社會合科') shortName = '社';
                        else if(subKey === '地科' || subKey === '地球科學') shortName = '地科';
                        else if(subKey === '地理') shortName = '地理';
                        else shortName = (subKey && subKey.charAt) ? subKey.charAt(0) : '?';

                        return `
                            <div class="text-[9px] md:text-[11px] font-bold ${subColor.bg} ${subColor.text} ${subColor.border} border px-1 py-0.5 rounded flex items-center justify-between shadow-sm">
                                <span class="truncate">${prefix}${shortName} <span class="font-black">${info.grade}</span></span>
                                ${info.photo ? '<span class="text-[8px] md:text-[9px] text-purple-500">📸</span>' : ''}
                            </div>
                        `;
                    };

                    if (viewingUser === 'ALL') {
                        let hasAny = false;
                        let tempContent = `<div class="flex flex-col gap-1 w-full mt-1 pb-1">`;
                        Object.entries(safeGrades).forEach(([u, dates]) => {
                            if (dates && dates[dateStr] && Object.keys(dates[dateStr]).length > 0) {
                                hasAny = true;
                                const uChar = getAvatarChar(u);
                                const prefix = `<span class="opacity-60 mr-1 text-[8px]">${uChar}</span>`;
                                Object.entries(dates[dateStr]).forEach(([subKey, info]) => {
                                    tempContent += buildBadge(subKey, info, prefix);
                                });
                            }
                        });
                        tempContent += `</div>`;
                        if (hasAny) cellContent = tempContent;
                    } else {
                        const userGrades = (safeGrades[viewingUser] && safeGrades[viewingUser][dateStr]) ? safeGrades[viewingUser][dateStr] : null;
                        if (userGrades && Object.keys(userGrades).length > 0) {
                            cellContent = `<div class="flex flex-col gap-1 w-full mt-1 pb-1">`;
                            Object.entries(userGrades).forEach(([subKey, info]) => {
                                cellContent += buildBadge(subKey, info);
                            });
                            cellContent += `</div>`;
                        }
                    }

                    const headerClass = isToday 
                        ? 'bg-gradient-to-r from-teal-400 to-emerald-400 text-white shadow-md' 
                        : isImportant 
                            ? 'bg-gradient-to-r from-orange-400 to-rose-400 text-white shadow-md' 
                            : 'bg-pink-50 text-pink-700';

                    const clickAction = (viewingUser === username || viewingUser === 'ALL') 
                        ? `openScoreModal('${dateStr}')` 
                        : `viewOthersScore(event, '${viewingUser}', '${dateStr}')`;

                    html += `
                        <div onclick="${clickAction}" class="bg-white border-2 border-pink-100 p-1 md:p-2 rounded-xl md:rounded-2xl shadow-sm flex flex-col transition-all cursor-pointer hover:border-teal-400 hover:shadow-md hover:-translate-y-1 overflow-hidden group relative">
                            <div class="flex justify-between items-start shrink-0 mb-0.5 md:mb-1 w-full">
                                <span class="w-5 h-5 md:w-7 md:h-7 flex items-center justify-center rounded-full text-xs md:text-sm font-bold ${headerClass} shrink-0">${d}</span>
                                <div class="flex flex-wrap justify-end gap-1 flex-1 mx-1 mt-0.5 overflow-hidden">
                                    ${usersWithDataToday.map(u => `
                                        <div onclick="viewOthersScore(event, '${u}', '${dateStr}')" 
                                             class="${getUserColor(u)} w-4 h-4 md:w-5 md:h-5 rounded-full flex items-center justify-center text-[9px] md:text-[11px] font-bold shadow-sm cursor-pointer hover:scale-110 transition-transform flex-shrink-0" 
                                             title="查看 ${(usersProfile && usersProfile[u]?.nickname) ? usersProfile[u].nickname : u} 的成績">
                                            ${getAvatarChar(u)}
                                        </div>
                                    `).join('')}
                                </div>
                                ${isImportant ? `<span class="text-xs md:text-sm drop-shadow-sm group-hover:scale-125 transition-transform shrink-0" title="${isImportant.title}">🔥</span>` : ''}
                            </div>
                            <div class="flex-1 overflow-y-auto custom-scrollbar">
                                ${cellContent}
                            </div>
                        </div>
                    `;
                }
                html += `</div>`;
                container.innerHTML = html;
            } catch(e) { console.error('Calendar error:', e); }
        };

        window.renderTimeline = () => {
            try {
                const container = document.getElementById('timeline-feed');
                if(!container) return;

                const feed = [];
                const safeGrades = allGrades || {};
                
                Object.entries(safeGrades).forEach(([u, dates]) => {
                    if(dates) {
                        Object.entries(dates).forEach(([d, subjects]) => {
                            if(subjects) {
                                Object.entries(subjects).forEach(([s, info]) => {
                                    feed.push({ user: u, date: d, subject: s, ...info });
                                });
                            }
                        });
                    }
                });

                feed.sort((a,b) => {
                    const timeA = a.updatedAt ? new Date(a.updatedAt) : new Date(a.date.replace(/-/g, '/'));
                    const timeB = b.updatedAt ? new Date(b.updatedAt) : new Date(b.date.replace(/-/g, '/'));
                    return timeB - timeA;
                });

                if (feed.length === 0) {
                    container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-70"><div class="text-4xl mb-2">🍃</div><div class="text-sm font-bold">尚無戰況紀錄，趕快搶頭香！</div></div>`;
                    return;
                }

                let html = '';
                feed.forEach(item => {
                    const isMe = item.user === username;
                    const isA = item.grade && item.grade.includes('A');
                    const emoji = isA ? '🏆' : '💪';
                    const subColor = getSubjectColor(item.subject);
                    const displayName = (usersProfile && usersProfile[item.user]?.nickname) ? usersProfile[item.user].nickname : item.user;

                    html += `
                        <div class="p-3 rounded-2xl border-2 ${subColor.border} ${subColor.bg} shadow-sm relative group cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all" onclick="viewOthersScore(null, '${item.user}', '${item.date}')">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-gray-700 bg-white px-2 py-0.5 rounded shadow-sm text-xs border border-gray-100 flex items-center gap-1.5">
                                    <div class="w-3 h-3 rounded-full flex items-center justify-center text-[8px] ${getUserColor(item.user)}">${getAvatarChar(item.user)}</div>
                                    ${isMe ? '我' : displayName}
                                </span>
                                <span class="text-[10px] text-gray-400 font-mono">${item.date}</span>
                            </div>
                            <div class="text-sm text-gray-600">
                                在 ${item.subject} 測驗斬獲了 <span class="font-black text-lg mx-1 ${subColor.text}">${item.grade}</span> ${emoji}
                            </div>
                            ${item.photo ? `<div class="absolute right-3 bottom-2 text-purple-400 text-lg opacity-40 group-hover:opacity-100 transition-opacity">📸</div>` : ''}
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch(e) { console.error('Timeline error:', e); }
        };

        window.renderLeaderboard = () => {
            try {
                const container = document.getElementById('leaderboard-feed');
                if(!container) return;

                let userStats = [];
                const safeUsers = Array.isArray(globalUsers) ? globalUsers : [];
                const safeGrades = allGrades || {};
                
                safeUsers.forEach(u => {
                    let stats = { user: u, aPlusPlus: 0, aPlus: 0, a: 0, totalEntries: 0 };
                    const uGrades = safeGrades[u] || {};
                    Object.values(uGrades).forEach(dayGrades => {
                        if(dayGrades) {
                            Object.values(dayGrades).forEach(item => {
                                if(item) {
                                    stats.totalEntries++;
                                    if (item.grade === 'A++') stats.aPlusPlus++;
                                    if (item.grade === 'A+') stats.aPlus++;
                                    if (item.grade === 'A') stats.a++;
                                }
                            });
                        }
                    });
                    stats.score = stats.aPlusPlus * 3 + stats.aPlus * 2 + stats.a * 1;
                    userStats.push(stats);
                });

                userStats.sort((a, b) => b.score - a.score || b.totalEntries - a.totalEntries);

                if (userStats.length === 0 || userStats[0].totalEntries === 0) {
                    container.innerHTML = `<div class="text-center text-gray-400 text-sm mt-4 font-bold">目前無人上榜</div>`;
                    return;
                }

                let html = '';
                userStats.forEach((stat, index) => {
                    if (stat.totalEntries === 0) return;
                    let rankMedal = '';
                    if (index === 0) rankMedal = '🥇';
                    else if (index === 1) rankMedal = '🥈';
                    else if (index === 2) rankMedal = '🥉';
                    else rankMedal = `<span class="text-teal-700 bg-teal-100 rounded-full w-6 h-6 flex items-center justify-center text-xs font-black shadow-inner">${index + 1}</span>`;

                    const displayName = (usersProfile && usersProfile[stat.user]?.nickname) ? usersProfile[stat.user].nickname : stat.user;

                    html += `
                        <div onclick="openPublicProfile('${stat.user}')" class="bg-white rounded-xl p-2.5 border border-teal-100 shadow-sm flex items-center gap-3 relative hover:scale-[1.02] transition-transform cursor-pointer hover:border-teal-300">
                            <div class="text-2xl w-8 flex justify-center drop-shadow-sm">${rankMedal}</div>
                            <div class="flex-1 min-w-0 flex items-center gap-2">
                                <div class="${getUserColor(stat.user)} w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-sm flex-shrink-0">
                                    ${getAvatarChar(stat.user)}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="font-black text-gray-700 text-sm mb-0.5 truncate">${displayName}</div>
                                    <div class="text-[10px] text-gray-500 flex gap-2">
                                        <span class="text-rose-500 font-bold bg-rose-50 px-1.5 rounded">A++ x ${stat.aPlusPlus}</span>
                                        <span class="text-orange-500 font-bold bg-orange-50 px-1.5 rounded">A+ x ${stat.aPlus}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="text-center bg-gray-50 p-1.5 rounded-lg border border-gray-100 shrink-0">
                                <div class="text-[10px] text-gray-400 font-bold">總刷題</div>
                                <div class="font-black text-teal-600 text-base leading-none">${stat.totalEntries}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch(e) { console.error('Leaderboard error:', e); }
        };

        window.renderChat = () => {
            try {
                const container = document.getElementById('chat-messages');
                if(!container) return;
                const safeChat = Array.isArray(chatMessages) ? chatMessages : [];
                container.innerHTML = safeChat.map(msg => {
                    const isMe = msg.user === username;
                    const displayName = (usersProfile && usersProfile[msg.user]?.nickname) ? usersProfile[msg.user].nickname : msg.user;
                    return `
                        <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                            <span class="text-[10px] text-gray-400 mb-0.5 px-1">${displayName}</span>
                            <div class="${isMe ? 'chat-bubble-me border border-blue-100' : 'chat-bubble-other border border-pink-100'} px-3 py-2 text-gray-700 shadow-sm inline-block max-w-[90%] break-words">
                                ${msg.text}
                            </div>
                        </div>
                    `;
                }).join('');
                container.scrollTop = container.scrollHeight;
            } catch(e) { console.error('Chat error:', e); }
        };

        window.renderMainContent = () => {
            try { if(window.renderCalendar) window.renderCalendar(); } catch(e) { console.error('Render Calendar Issue:', e); }
            try { if(window.renderTimeline) window.renderTimeline(); } catch(e) { console.error('Render Timeline Issue:', e); }
            try { if(window.renderLeaderboard) window.renderLeaderboard(); } catch(e) { console.error('Render Leaderboard Issue:', e); }
            try { 
                const adminModal = document.getElementById('admin-panel-modal');
                if(isAdmin && adminModal && !adminModal.classList.contains('hidden') && window.renderAdminUsers) {
                    window.renderAdminUsers(); 
                }
            } catch(e) { console.error('Render Admin Users Issue:', e); }
        };

        window.changeMonth = (delta) => {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            window.renderMainContent();
        };

        window.changeViewingUser = (user) => {
            viewingUser = user;
            window.renderCalendar();
        };

        window.toggleEmojiPicker = (e) => {
            if(e) e.stopPropagation();
            const picker = document.getElementById('emoji-picker');
            if(picker) picker.classList.toggle('hidden');
        };

        window.insertEmoji = (emoji) => {
            const input = document.getElementById('chatInput');
            if(input) { input.value += emoji; input.focus(); }
            const picker = document.getElementById('emoji-picker');
            if(picker) picker.classList.add('hidden');
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            unsubUsers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList'), (snap) => {
                globalUsers = snap.exists() ? snap.data().users || [] : [];
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            unsubProfile = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile'), (snap) => {
                usersProfile = snap.exists() ? snap.data().profiles || {} : {};
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);
            
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList'), (snap) => {
                globalUsers = snap.exists() ? snap.data().users || [] : [];
                if (username && !globalUsers.includes(username)) { alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！'); window.logout(); }
            }, errHandler);

            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile'), (snap) => {
                usersProfile = snap.exists() ? snap.data().profiles || {} : {};
                if(username) try { window.renderMainContent(); } catch(e){}
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) importantDates = snap.data().list || [];
                else {
                    importantDates = [{ date: '2026-09-09', title: '第1次模擬考' }, { date: '2026-10-13', title: '第1次段考' }, { date: '2026-10-28', title: '第2次模擬考' }];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) {
                    try { window.renderSidebar(); } catch(e){}
                    try { 
                        const adminModal = document.getElementById('admin-panel-modal');
                        if(isAdmin && adminModal && !adminModal.classList.contains('hidden')) window.renderAdminDates(); 
                    } catch(e){}
                }
            }, errHandler);

            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat'), (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) try { window.renderChat(); } catch(e){}
            }, errHandler);

            if(unsubGrades) unsubGrades();
            unsubGrades = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Grades'), (snap) => {
                let newAllGrades = {};
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if(!data.user || !data.date || !data.subSubject) return;
                    if(!newAllGrades[data.user]) newAllGrades[data.user] = {};
                    if(!newAllGrades[data.user][data.date]) newAllGrades[data.user][data.date] = {};
                    newAllGrades[data.user][data.date][data.subSubject] = {
                        mainSubject: data.mainSubject || '', grade: data.grade, photo: data.photo || null, updatedAt: data.updatedAt || ''
                    };
                });
                allGrades = newAllGrades;
                if(username) try { window.renderMainContent(); } catch(e){}
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) { window.renderSetup(); return; }

            try {
                if (!appInstance) {
                    appInstance = initializeApp({ ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey });
                    auth = getAuth(appInstance); db = getFirestore(appInstance);
                }
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) doCompleteLogin(savedUser);
                        else { setupLoginListener(); window.renderLogin(); }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error); alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();
    </script>
</body>
</html>
