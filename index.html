            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('prof-photo-upload').dataset.base64 = base64;
                    document.getElementById('prof-photo-preview').src = base64;
                    document.getElementById('prof-photo-preview').classList.remove('hidden');
                    document.getElementById('prof-photo-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);

        window.handlePhotoUpload = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.85);
                    setPhotoPreview(base64);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');

                if(snap.exists()) {

                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2026-09-09', title: 'з¬¬1ж¬ЎжЁЎж“¬иҖғ' },
                        { date: '2026-10-13', title: 'з¬¬1ж¬Ўж®өиҖғ' },
                        { date: '2026-10-28', title: 'з¬¬2ж¬ЎжЁЎж“¬иҖғ' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
                if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminDates();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            const gradesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'AllGrades');
            if(unsubGrades) unsubGrades();
            unsubGrades = onSnapshot(gradesRef, (snap) => {
                if(snap.exists()) allGrades = snap.data().data || {};
                if(username) window.renderMainContent();
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            username = savedUser;
                            viewingUser = username; 
                            isAdmin = (username === 'Nick');
                            setupListeners();
                            window.renderMain();
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase йҖЈз·ҡеӨұж•—:", error);
                alert("Firebase йҖЈз·ҡеӨұж•—пјҢи«ӢжӘўжҹҘзі»зөұиЁӯе®ҡеҸғж•ёжҳҜеҗҰжӯЈзўәпјҒ");
                window.renderSetup();
            }
        };

        // е•ҹеӢ• App
        initApp();

    </script>
</body>
</html>
