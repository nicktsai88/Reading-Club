<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎒 邁向5A10+ 國中會考讀書會 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 確保所有瀏覽器都能給予正確的滿版高度 */
        html, body {
            height: 100%; 
            height: -webkit-fill-available;
            height: 100dvh;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(#ffcdd2 2px, transparent 2px),
                radial-gradient(#b2ebf2 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #4a4a4a;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 3px solid #ffe4e6;
            box-shadow: 0 8px 32px rgba(255, 192, 203, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(253, 164, 175, 0.6); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(253, 164, 175, 1); }

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        /* 垂直跑馬燈效果設定 */
        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {
            animation-play-state: paused;
        }
        
        .chat-bubble-me { background: #e0f2fe; border-radius: 1rem 1rem 0 1rem; }
        .chat-bubble-other { background: #fce7f3; border-radius: 1rem 1rem 1rem 0; }
    </style>
</head>
<body class="w-full flex flex-col overflow-hidden">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>
    <div id="modals-container"></div> <!-- 放置所有動態 Modal 的容器 -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  系統設定與常數
        // ==========================================
        const BASE_FIREBASE_CONFIG = {
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'study-group-app';
        
        const EXAM_DATE = new Date('2027-05-22T00:00:00');
        const SUBJECTS = ['國文', '英文', '數學', '自然', '社會'];
        const SUB_SUBJECTS = {
            '自然': ['自然合科', '生物', '理化', '地科'],
            '社會': ['社會合科', '歷史', '地理', '公民']
        };
        const GRADES = ['A++', 'A+', 'A', 'B++', 'B+', 'B', 'C'];

        // ==========================================
        //  色彩計畫系統 (科目與使用者頭像)
        // ==========================================
        const SUBJECT_COLORS = {
            '國文': { bg: 'bg-red-50', text: 'text-red-700', border: 'border-red-200' },
            '英文': { bg: 'bg-blue-50', text: 'text-blue-700', border: 'border-blue-200' },
            '數學': { bg: 'bg-indigo-50', text: 'text-indigo-700', border: 'border-indigo-200' },
            '自然': { bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-200' },
            '自然合科': { bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-200' },
            '生物': { bg: 'bg-lime-50', text: 'text-lime-700', border: 'border-lime-200' },
            '理化': { bg: 'bg-cyan-50', text: 'text-cyan-700', border: 'border-cyan-200' },
            '地科': { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200' },
            '地球科學': { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200' },
            '社會': { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200' },
            '社會合科': { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200' },
            '歷史': { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-200' },
            '地理': { bg: 'bg-yellow-50', text: 'text-yellow-700', border: 'border-yellow-200' },
            '公民': { bg: 'bg-fuchsia-50', text: 'text-fuchsia-700', border: 'border-fuchsia-200' },
            'default': { bg: 'bg-gray-50', text: 'text-gray-700', border: 'border-gray-200' }
        };
        const getSubjectColor = (sub) => SUBJECT_COLORS[sub] || SUBJECT_COLORS['default'];

        const USER_COLORS = [
            'bg-rose-500 text-white', 'bg-blue-500 text-white', 'bg-emerald-500 text-white',
            'bg-violet-500 text-white', 'bg-amber-500 text-white', 'bg-fuchsia-500 text-white',
            'bg-cyan-500 text-white', 'bg-orange-500 text-white', 'bg-lime-500 text-white',
            'bg-pink-500 text-white', 'bg-indigo-500 text-white', 'bg-teal-500 text-white'
        ];
        const getUserColor = (name) => {
            if(!name) return USER_COLORS[0];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
        };

        // 資料狀態
        let appInstance, auth, db;
        let currentUser = null;
        let username = '';
        let viewingUser = ''; 
        let isAdmin = false;
        
        let globalUsers = [];
        let importantDates = [];
        let allGrades = {}; 
        let chatMessages = [];
        let usersProfile = {}; // 儲存所有使用者的完整資料 (包含密碼、暱稱、目標等)
        
        let modalState = { date: '', mainSubject: '', subSubject: '', grade: '', photoBase64: '' };
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0-11
        
        let unsubUsers, unsubDates, unsubGrades, unsubChat, unsubProfile;

        // ==========================================
        //  輔助工具函式
        // ==========================================
        const getDaysLeft = (targetDateStr) => {
            const now = new Date();
            now.setHours(0,0,0,0);
            const target = new Date(targetDateStr);
            target.setHours(0,0,0,0);
            const diffTime = target - now;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const getStoredConfig = () => {
            const stored = localStorage.getItem('study_group_firebase_config');
            if (stored) {
                try { return JSON.parse(stored); } catch(e) {}
            }
            if (typeof __firebase_config !== 'undefined') {
                try { return JSON.parse(__firebase_config); } catch(e) {}
            }
            return null;
        };

        // 取得使用者顯示暱稱的首字
        const getAvatarChar = (u) => {
            if(usersProfile[u] && usersProfile[u].nickname) {
                return usersProfile[u].nickname.charAt(0);
            }
            return u ? u.charAt(0) : '?';
        };

        //  UI 渲染函式 - 系統框架與登入
        // ==========================================
        window.renderApp = () => { 
            document.getElementById('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col relative overflow-hidden bg-white/20"></div>`; 
            renderGlobalModals();
        };

        window.renderSetup = () => {
            const container = document.getElementById('view-container');
            const currentConfig = getStoredConfig() || {};
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">

                            <div>
                                <label class="block text-xs font-bold text-teal-800 mb-1">API Key (必填) *</label>
                                <input type="text" id="cfg-apiKey" value="${currentConfig.apiKey || ''}" placeholder="AIzaSy..." class="w-full px-3 py-2 rounded-lg border border-teal-200 focus:outline-none focus:border-teal-400 text-sm font-mono">
                            </div>
                        </div>
                        <div class="mt-6 flex gap-3 justify-center">
                            ${currentConfig.apiKey ? `<button onclick="renderLogin()" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-50 border border-gray-200 hover:bg-gray-100 transition-colors">取消</button>` : ''}
                            <button onclick="saveFirebaseConfig()" class="flex-1 bg-gradient-to-r from-teal-400 to-emerald-400 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:shadow-lg transition-all">
                                💾 儲存並啟動系統
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderLogin = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 overflow-y-auto">
                    <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl z-10 w-[36rem] max-w-[95vw] text-center border-4 border-pink-200 relative overflow-hidden">
                        <div class="absolute top-4 left-4 text-4xl animate-bounce-slow">✨</div>
                        <div class="absolute bottom-4 right-4 text-4xl animate-bounce-slow" style="animation-delay: 1s;">🎓</div>
                        <button onclick="renderSetup()" class="absolute top-5 right-5 text-gray-400 hover:text-teal-600 transition-colors bg-white/50 p-2 rounded-full border border-gray-200 hover:bg-white" title="系統設定">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </button>
                        
                        <div class="flex justify-center items-center gap-4 md:gap-6 mb-8 mt-2">
                            <div class="w-28 h-28 md:w-32 md:h-32 bg-white rounded-full p-1 shadow-lg border-4 border-red-200 overflow-hidden flex justify-center items-center hover:scale-105 transition-transform">
                                <img src="school1.jpg" alt="雄中" class="w-full h-full object-contain rounded-full" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iI2ZmY2RkMiIvPjwvc3ZnPg=='">
                            </div>
                            <div class="text-4xl md:text-5xl font-black text-pink-400">X</div>
                            <div class="w-28 h-28 md:w-32 md:h-32 bg-white rounded-full p-1 shadow-lg border-4 border-red-200 overflow-hidden flex justify-center items-center hover:scale-105 transition-transform">
                                <img src="school2.jpg" alt="雄女" class="w-full h-full object-contain rounded-full" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iI2ZmY2RkMiIvPjwvc3ZnPg=='">
                            </div>
                        </div>

                        <h1 class="text-3xl md:text-4xl font-black text-rose-500 mb-3 drop-shadow-sm tracking-wide">🎒 邁向5A10+</h1>
                        <h2 class="text-xl font-bold text-teal-600 mb-8 bg-teal-50 inline-block px-6 py-2 rounded-full border border-teal-100">國中會考讀書會 💯</h2>
                        
                        <div class="bg-white/60 p-6 rounded-3xl border border-pink-100 mb-6">
                            <p class="text-sm text-rose-400 font-bold mb-3">👇 點擊你的暱稱登入 👇</p>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${globalUsers.length > 0 ? 
                                    globalUsers.map(u => {
                                        const dispName = usersProfile[u]?.nickname || u;
                                        return `<button onclick="initiateLogin('${u}')" class="text-md font-bold bg-white border-2 border-rose-200 text-rose-600 hover:bg-rose-50 hover:scale-105 px-5 py-2.5 rounded-xl shadow-sm transition-all">👦 ${dispName}</button>`;
                                    }).join('') 
                                    : `<span class="text-sm text-gray-400">尚無參賽者，請點擊下方註冊</span>`
                                }
                            </div>
                        </div>
                        
                        <div class="flex gap-2 w-full mt-2">
                            <button onclick="openProfileEditModal('', true)" class="w-full bg-gradient-to-r from-teal-400 to-emerald-400 text-white font-black py-4 px-6 text-xl rounded-2xl shadow-md hover:shadow-lg transition-all transform hover:scale-[1.02]">
                                🚀 註冊新帳號
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="bg-white/80 backdrop-blur-md border-b-2 border-pink-200 p-3 flex justify-between items-center shadow-sm shrink-0 z-20 relative">
                    <div class="flex items-center gap-4 pl-2">
                        <div class="flex -space-x-4">
                            <img src="school1.jpg" alt="雄中" class="w-full h-full object-contain rounded-full border-2 border-white shadow-sm z-10 bg-rose-50" onerror="this.style.display='none'">
                            <img src="school2.jpg" alt="雄女" class="w-full h-full object-contain rounded-full border-2 border-white shadow-sm z-0 bg-rose-50" onerror="this.style.display='none'">
                        </div>
                        <h1 class="text-2xl md:text-3xl font-black text-rose-500 tracking-wider hidden sm:block">邁向5A10+ 讀書會 🏆</h1>
                        <h1 class="text-xl font-black text-rose-500 tracking-wider block sm:hidden">邁向5A10+</h1>
                    </div>
                    <div class="flex items-center gap-2 md:gap-3 pr-2">
                        ${isAdmin ? `<button onclick="openAdminPanel()" class="bg-gradient-to-r from-amber-400 to-orange-400 text-white font-bold px-3 py-1.5 rounded-lg shadow-sm hover:scale-105 transition-transform text-sm shrink-0">👑 管理員面板</button>` : ''}
                        
                        <button onclick="openProfileEditModal('${username}')" class="font-bold text-teal-700 bg-teal-50 px-3 py-1.5 rounded-lg border border-teal-200 shadow-sm hover:bg-teal-100 transition-colors text-sm flex items-center gap-1 shrink-0">
                            <div class="${getUserColor(username)} w-5 h-5 rounded-full flex items-center justify-center text-[10px] text-white">${getAvatarChar(username)}</div>

                            <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar text-sm relative min-h-0"></div>
                            
                            <div class="p-2 bg-white flex flex-col border-t border-pink-100 relative shrink-0">
                                <div id="emoji-picker" class="hidden absolute bottom-full left-2 mb-2 bg-white border border-pink-200 p-2 rounded-xl shadow-lg grid grid-cols-5 gap-2 z-50">
                                    ${['😀','😂','🥰','😎','🥺','💪','🔥','💯','📚','🎓','✨','🎉','📝','🏆','💖'].map(e => `<button onclick="insertEmoji('${e}')" class="text-xl hover:scale-125 transition-transform">${e}</button>`).join('')}

                                <div class="flex gap-1.5 items-center w-full">

                            <button onclick="changeMonth(-1)" class="px-3 py-1.5 md:px-4 md:py-2 bg-pink-50 border border-pink-200 hover:bg-pink-100 text-pink-700 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">◀ 上個月</button>

                        </div>

                    </div>

                    <div class="w-full md:w-72 lg:w-80 flex flex-col bg-white/60 z-10 shrink-0 border-l-2 border-pink-100 min-h-0 h-full">
                        <div class="flex-1 flex flex-col min-h-0 border-b-2 border-pink-100">
                            <div class="bg-gradient-to-r from-rose-100 to-pink-100 p-2 text-center font-bold text-rose-600 shadow-sm shrink-0 text-sm">🌟 最新戰況動態</div>

        // 全域 Modals 渲染 (放置於 #modals-container)
        const renderGlobalModals = () => {
            const container = document.getElementById('modals-container');
            container.innerHTML = `
                <!-- 輸入密碼登入 Modal -->

        window.openGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const inner = modal.firstElementChild;
                if(inner.classList.contains('scale-95')) {
                    inner.classList.remove('scale-95');
                }
            }, 10);
        };

        window.closeGlobalModal = (id) => {
            const modal = document.getElementById(id);
            if(!modal) return;
            modal.classList.add('opacity-0');
            const inner = modal.firstElementChild;
            if(inner && inner.classList.contains('scale-95') === false) {
                inner.classList.add('scale-95');
            }
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        // ==========================================
        //  通用動作邏輯 (設定、登出、聊天等) 
        // ==========================================
        window.saveFirebaseConfig = () => {
            const apiKey = document.getElementById('cfg-apiKey').value.trim();
            if (!apiKey) return alert("API Key 為必填欄位！");
            localStorage.setItem('study_group_firebase_config', JSON.stringify({ apiKey }));
            alert("設定已儲存！系統將重新啟動。");
            window.location.reload(); 
        };

        window.logout = () => {
            username = '';
            viewingUser = '';
            isAdmin = false;
            localStorage.removeItem('study_group_user');
            
            if(unsubDates) unsubDates();
            if(unsubGrades) unsubGrades();
            if(unsubChat) unsubChat();
            if(unsubUsers) unsubUsers();
            if(unsubProfile) unsubProfile();
            
            setupLoginListener();
            window.renderLogin();
        };

        window.sendChat = async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if(!text) return;
            
            const newMsg = { user: username, text: text, timestamp: new Date().toISOString() };
            const newChat = [...chatMessages, newMsg];
            if(newChat.length > 50) newChat.shift();
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat'), { messages: newChat });
            input.value = '';
        };

        document.addEventListener('click', (e) => {
            const emojiPicker = document.getElementById('emoji-picker');
            const toggleBtn = document.getElementById('emoji-toggle-btn');
            if (emojiPicker && !emojiPicker.classList.contains('hidden')) {
                if (!emojiPicker.contains(e.target) && e.target !== toggleBtn) {
                    emojiPicker.classList.add('hidden');
                }
            }
        });


        // ==========================================
        //  登入/註冊/個資 邏輯
        // ==========================================
        window.initiateLogin = (name) => {
            const trimmed = name.trim();
            if(!trimmed) return alert("請傳入名稱！");
            
            if (globalUsers.includes(trimmed) && usersProfile[trimmed]) {
                document.getElementById('login-pwd-username').value = trimmed;
                const dispName = usersProfile[trimmed]?.nickname || trimmed;
                document.getElementById('login-pwd-username-display').innerText = `你好，${dispName}！請輸入密碼以繼續：`;
                document.getElementById('login-pwd-input').value = '';
                openGlobalModal('login-pwd-modal');
                setTimeout(() => document.getElementById('login-pwd-input').focus(), 100);
            }
        };

        window.confirmLoginPassword = () => {
            const name = document.getElementById('login-pwd-username').value;
            const pwd = document.getElementById('login-pwd-input').value;
            
            if (name === 'Nick' && pwd !== '2iligloi') {
                return alert("Nick 為管理員保留帳號，密碼錯誤！");
            }
            if (usersProfile[name] && usersProfile[name].password !== pwd) {
                return alert("密碼錯誤，請重試！");
            }
            
            closeGlobalModal('login-pwd-modal');
            doCompleteLogin(name);
        };

        window.openProfileEditModal = (name = '', isRegister = false) => {
            const nameInput = document.getElementById('prof-name');
            nameInput.value = name;
            
            if (isRegister && !name) {
                // 完全新的註冊
                nameInput.disabled = false;
                nameInput.classList.remove('bg-gray-100', 'text-gray-500');
                nameInput.classList.add('bg-white', 'text-gray-700');
                nameInput.placeholder = "請輸入真實姓名";
            } else {
                // 修改現有資料
                nameInput.disabled = true;
                nameInput.classList.remove('bg-white', 'text-gray-700');
                nameInput.classList.add('bg-gray-100', 'text-gray-500');
                nameInput.placeholder = "請輸入真實姓名";
            }
            
            const isNick = (name === 'Nick');
            const currentPwd = usersProfile[name]?.password || (isNick ? '2iligloi' : '');
            document.getElementById('prof-pwd').value = currentPwd;
            document.getElementById('prof-pwd-confirm').value = currentPwd;

            if (isNick && isRegister) {
                document.getElementById('prof-pwd').disabled = true;
                document.getElementById('prof-pwd-confirm').disabled = true;
                document.getElementById('pwd-hint').innerText = "(管理員預設密碼不可修改)";
            } else {
                document.getElementById('prof-pwd').disabled = false;
                document.getElementById('prof-pwd-confirm').disabled = false;
                document.getElementById('pwd-hint').innerText = "";
            }

            document.getElementById('prof-nickname').value = usersProfile[name]?.nickname || name;
            document.getElementById('prof-birthday').value = usersProfile[name]?.birthday || '';
            document.getElementById('prof-target').value = usersProfile[name]?.target || '';
            document.getElementById('prof-motto').value = usersProfile[name]?.motto || '';
            
            let photo = usersProfile[name]?.photo || '';
            document.getElementById('prof-photo-upload').dataset.base64 = photo;
            
            if (photo) {
                document.getElementById('prof-photo-preview').src = photo;
                document.getElementById('prof-photo-preview').classList.remove('hidden');
                document.getElementById('prof-photo-placeholder').classList.add('hidden');
            } else {
                document.getElementById('prof-photo-preview').classList.add('hidden');
                document.getElementById('prof-photo-placeholder').classList.remove('hidden');
            }

            document.getElementById('profile-modal-title').innerText = isRegister ? '🚀 歡迎加入！請建立專屬資料卡' : '📝 修改我的資料卡';
            document.getElementById('profile-modal-close').style.display = isRegister ? 'none' : 'flex'; 
            
            openGlobalModal('profile-edit-modal');
        };

        window.handleProfilePhoto = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('prof-photo-upload').dataset.base64 = base64;
                    document.getElementById('prof-photo-preview').src = base64;
                    document.getElementById('prof-photo-preview').classList.remove('hidden');
                    document.getElementById('prof-photo-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);

            let transferTarget = null;
            const others = globalUsers.filter(u => u !== userToDelete);
            if (others.length > 0) {
                const ans = prompt(`是否轉移其成績給其他人？\n(若不轉移請留空按確定，將連帶刪除所有成績)\n可選對象: ${others.join(', ')}`);

                    transferTarget = ans.trim();
                } else if (ans) {
                    return alert("輸入的名稱無效，已取消刪除操作。");
                }
            }

            try {
                const newUsers = globalUsers.filter(u => u !== userToDelete);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList'), { users: newUsers });

                let newProfiles = JSON.parse(JSON.stringify(usersProfile));
                delete newProfiles[userToDelete];

                let newGrades = JSON.parse(JSON.stringify(allGrades));

                    if (transferTarget) {
                        if (!newGrades[transferTarget]) newGrades[transferTarget] = {};
                        Object.keys(newGrades[userToDelete]).forEach(dateStr => {

            globalUsers.forEach(u => {
                let stats = { user: u, aPlusPlus: 0, aPlus: 0, a: 0, totalEntries: 0 };
                const uGrades = allGrades[u] || {};
                Object.values(uGrades).forEach(dayGrades => {
                    Object.values(dayGrades).forEach(item => {
                        stats.totalEntries++;
                        if (item.grade === 'A++') stats.aPlusPlus++;
                        if (item.grade === 'A+') stats.aPlus++;
                        if (item.grade === 'A') stats.a++;
                    });
                });
                stats.score = stats.aPlusPlus * 3 + stats.aPlus * 2 + stats.a * 1;
                userStats.push(stats);
            });

            userStats.sort((a, b) => b.score - a.score || b.totalEntries - a.totalEntries);

            if (userStats.length === 0 || userStats[0].totalEntries === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 text-sm mt-4 font-bold">目前無人上榜</div>`;
                return;
            }

            let html = '';
            userStats.forEach((stat, index) => {
                if (stat.totalEntries === 0) return;
                let rankMedal = '';
                if (index === 0) rankMedal = '🥇';
                else if (index === 1) rankMedal = '🥈';
                else if (index === 2) rankMedal = '🥉';
                else rankMedal = `<span class="text-teal-700 bg-teal-100 rounded-full w-6 h-6 flex items-center justify-center text-xs font-black shadow-inner">${index + 1}</span>`;

                const displayName = usersProfile[stat.user]?.nickname || stat.user;

                html += `
                    <div onclick="openPublicProfile('${stat.user}')" class="bg-white rounded-xl p-2.5 border border-teal-100 shadow-sm flex items-center gap-3 relative hover:scale-[1.02] transition-transform cursor-pointer hover:border-teal-300">
                        <div class="text-2xl w-8 flex justify-center drop-shadow-sm">${rankMedal}</div>
                        <div class="flex-1 min-w-0 flex items-center gap-2">
                            <div class="${getUserColor(stat.user)} w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-sm flex-shrink-0">
                                ${getAvatarChar(stat.user)}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="font-black text-gray-700 text-sm mb-0.5 truncate">${displayName}</div>
                                <div class="text-[10px] text-gray-500 flex gap-2">
                                    <span class="text-rose-500 font-bold bg-rose-50 px-1.5 rounded">A++ x ${stat.aPlusPlus}</span>
                                    <span class="text-orange-500 font-bold bg-orange-50 px-1.5 rounded">A+ x ${stat.aPlus}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-center bg-gray-50 p-1.5 rounded-lg border border-gray-100 shrink-0">
                            <div class="text-[10px] text-gray-400 font-bold">總刷題</div>
                            <div class="font-black text-teal-600 text-base leading-none">${stat.totalEntries}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        window.renderMainContent = () => {
            if(window.renderCalendar) window.renderCalendar();
            if(window.renderTimeline) window.renderTimeline();
            if(window.renderLeaderboard) window.renderLeaderboard();
            if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminUsers();
        };

        // ==========================================
        //  輸入成績邏輯 
        // ==========================================
        window.openScoreModal = (dateStr) => {
            modalState = { date: dateStr, mainSubject: '', subSubject: '', grade: '', photoBase64: '' };
            document.getElementById('modal-date').innerText = dateStr;
            SUBJECTS.forEach(s => { document.getElementById(`btn-sub-${s}`).classList.remove('bg-teal-500', 'text-white'); });
            GRADES.forEach(g => { document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`).classList.remove('bg-rose-500', 'text-white'); });
            document.getElementById('sub-subject-container').classList.add('hidden');
            document.getElementById('photo-upload').value = '';
            document.getElementById('photo-preview-container').classList.add('hidden');
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('btn-delete-grade').classList.add('hidden');
            openGlobalModal('score-modal');
        };

        window.viewOthersScore = (e, otherUser, dateStr) => {
            if (e) e.stopPropagation(); 
            const data = (allGrades[otherUser] && allGrades[otherUser][dateStr]) ? allGrades[otherUser][dateStr] : null;
            if(!data || Object.keys(data).length === 0) {
                alert(`${usersProfile[otherUser]?.nickname || otherUser} 在 ${dateStr} 尚未登錄成績！`);
                return; 
            }
            
            document.getElementById('view-modal-date').innerText = dateStr;
            let contentHtml = `
                <div class="flex items-center gap-3 mb-4 border-b-2 border-teal-200 pb-3">
                    <div class="${getUserColor(otherUser)} w-10 h-10 rounded-full flex items-center justify-center text-lg font-black shadow-sm">
                        ${getAvatarChar(otherUser)}
                    </div>
                    <h3 class="font-black text-xl text-teal-800">${usersProfile[otherUser]?.nickname || otherUser} 的戰果</h3>
                </div>
            `;
            
            Object.entries(data).forEach(([subKey, item]) => {
                const subColor = getSubjectColor(subKey);
                contentHtml += `
                    <div class="mb-5 bg-white p-4 rounded-2xl shadow-sm border ${subColor.border} ${subColor.bg}">
                        <div class="flex justify-between items-center mb-2 ${subColor.text}">
                            <span class="font-bold text-lg">📌 ${subKey}</span>
                            <span class="font-black text-xl">${item.grade}</span>
                        </div>
                        ${item.photo ? `<div class="mt-3"><img src="${item.photo}" class="w-full rounded-xl border border-gray-200 shadow-sm" alt="考卷照片"></div>` : '<div class="text-xs text-gray-400 text-center mt-2">（無附照片）</div>'}
                    </div>
                `;
            });
            document.getElementById('view-score-content').innerHTML = contentHtml;
            openGlobalModal('view-score-modal');
        };

        window.selectSubject = (sub) => {
            modalState.mainSubject = sub;
            SUBJECTS.forEach(s => {
                const el = document.getElementById(`btn-sub-${s}`);
                if(s === sub) el.classList.add('bg-teal-500', 'text-white');
                else el.classList.remove('bg-teal-500', 'text-white');
            });

            const subContainer = document.getElementById('sub-subject-container');
            const subSelector = document.getElementById('sub-subject-selector');

            if (SUB_SUBJECTS[sub]) {
                subContainer.classList.remove('hidden');
                subSelector.innerHTML = SUB_SUBJECTS[sub].map(sItem => 
                    `<button onclick="selectSubSubject('${sItem}')" id="btn-subitem-${sItem}" class="py-1.5 rounded-lg border-2 border-blue-200 text-blue-700 font-bold hover:bg-blue-50 transition-colors bg-white shadow-sm text-sm">${sItem}</button>`
                ).join('');

                let subToSelect = SUB_SUBJECTS[sub][0];
                for (let sItem of SUB_SUBJECTS[sub]) {
                    if (allGrades[username] && allGrades[username][modalState.date] && allGrades[username][modalState.date][sItem]) {
                        subToSelect = sItem; break;
                    }
                }
                window.selectSubSubject(subToSelect);
            } else {
                subContainer.classList.add('hidden');
                window.selectSubSubject(sub);
            }
        };

        window.selectSubSubject = (subItem) => {
            modalState.subSubject = subItem;
            if (SUB_SUBJECTS[modalState.mainSubject]) {
                SUB_SUBJECTS[modalState.mainSubject].forEach(s => {
                    const el = document.getElementById(`btn-subitem-${s}`);
                    if (el) {
                        if(s === subItem) el.classList.add('bg-blue-500', 'text-white');
                        else el.classList.remove('bg-blue-500', 'text-white');
                    }
                });
            }
            const existing = (allGrades[username] && allGrades[username][modalState.date] && allGrades[username][modalState.date][subItem]) ? allGrades[username][modalState.date][subItem] : null;
            if (existing) {
                window.selectGrade(existing.grade);
                if (existing.photo) setPhotoPreview(existing.photo);
                else {
                     modalState.photoBase64 = '';
                     document.getElementById('photo-preview-container').classList.add('hidden');
                     document.getElementById('photo-placeholder').classList.remove('hidden');
                }
                document.getElementById('btn-delete-grade').classList.remove('hidden');
            } else {
                modalState.grade = '';
                modalState.photoBase64 = '';
                GRADES.forEach(g => { document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`).classList.remove('bg-rose-500', 'text-white'); });
                document.getElementById('photo-preview-container').classList.add('hidden');
                document.getElementById('photo-placeholder').classList.remove('hidden');
                document.getElementById('btn-delete-grade').classList.add('hidden');
            }
        };

        window.selectGrade = (grade) => {
            modalState.grade = grade;
            GRADES.forEach(g => {
                const el = document.getElementById(`btn-grade-${g.replace('+','p').replace('+','p')}`);
                if(g === grade) el.classList.add('bg-rose-500', 'text-white');
                else el.classList.remove('bg-rose-500', 'text-white');
            });
        };

        window.handlePhotoUpload = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.85);
                    setPhotoPreview(base64);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        const setPhotoPreview = (base64) => {
            modalState.photoBase64 = base64;
            const preview = document.getElementById('photo-preview');
            preview.src = base64;
            document.getElementById('photo-placeholder').classList.add('hidden');
            document.getElementById('photo-preview-container').classList.remove('hidden');
            document.getElementById('photo-preview-container').classList.add('flex');
        };

        window.saveGrade = async () => {
            if(!modalState.subSubject) return alert("請選擇科目！");
            if(!modalState.grade) return alert("請選擇成績等級！");

            let updatedGrades = JSON.parse(JSON.stringify(allGrades));
            if(!updatedGrades[username]) updatedGrades[username] = {};
            if(!updatedGrades[username][modalState.date]) updatedGrades[username][modalState.date] = {};
            
            updatedGrades[username][modalState.date][modalState.subSubject] = {
                grade: modalState.grade,
                photo: modalState.photoBase64 || null,
                updatedAt: new Date().toISOString() 
            };

            try {
                const gradesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'AllGrades');
                await setDoc(gradesRef, { data: updatedGrades }, { merge: true });
                closeGlobalModal('score-modal');
            } catch(e) {
                console.error(e);
                alert("儲存失敗，請確認圖片是否過大！");
            }
        };

        window.deleteGradeRecord = async () => {
            if(!modalState.subSubject) return;
            if(!confirm(`確定要刪除 ${modalState.date} 的 ${modalState.subSubject} 紀錄嗎？`)) return;

            let updatedGrades = JSON.parse(JSON.stringify(allGrades));
            if(updatedGrades[username] && updatedGrades[username][modalState.date] && updatedGrades[username][modalState.date][modalState.subSubject]) {
                delete updatedGrades[username][modalState.date][modalState.subSubject];
                if(Object.keys(updatedGrades[username][modalState.date]).length === 0) {
                    delete updatedGrades[username][modalState.date];
                }
                try {
                    const gradesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'AllGrades');
                    await setDoc(gradesRef, { data: updatedGrades }, { merge: true });
                    closeGlobalModal('score-modal');
                } catch(e) { console.error(e); }
            }
        };

        // ==========================================
        //  Firebase 監聽與初始化 (包含幽靈帳號檢查)
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2026-09-09', title: '第1次模擬考' },
                        { date: '2026-10-13', title: '第1次段考' },
                        { date: '2026-10-28', title: '第2次模擬考' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
                if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminDates();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            const gradesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'AllGrades');
            if(unsubGrades) unsubGrades();
            unsubGrades = onSnapshot(gradesRef, (snap) => {
                if(snap.exists()) allGrades = snap.data().data || {};
                if(username) window.renderMainContent();
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            username = savedUser;
                            viewingUser = username; 
                            isAdmin = (username === 'Nick');
                            setupListeners();
                            window.renderMain();
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        // 啟動 App
        initApp();

    </script>
</body>
</html>
