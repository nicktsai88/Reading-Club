            background-position: 0 0, 20px 20px;
            -webkit-tap-highlight-color: transparent;
            color: #4a4a4a;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 3px solid #ffe4e6;
            box-shadow: 0 8px 32px rgba(255, 192, 203, 0.2);

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(253, 164, 175, 0.6); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(253, 164, 175, 1); }

        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }

        /* 垂直跑馬燈效果設定 */
        @keyframes marqueeVertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .marquee-container {
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeVertical 15s linear infinite;
        }
        .marquee-container:hover .marquee-content, 
        .marquee-container:active .marquee-content {
            animation-play-state: paused;
        }
        
        .chat-bubble-me { background: #e0f2fe; border-radius: 1rem 1rem 0 1rem; }
        .chat-bubble-other { background: #fce7f3; border-radius: 1rem 1rem 1rem 0; }

            document.getElementById('progress-user-name').innerText = `📈 ${dispName} 的闖關進度`;

            const uGrades = allGrades[targetUser] || {};
            
            const getBestGrade = (subKey) => {
                let bestObj = null;
                let bestW = 0;

                Object.entries(uGrades).forEach(([dateStr, dayData]) => {
                    if(dayData[subKey]) {
                        const g = dayData[subKey].grade;
                        const w = GRADE_WEIGHT[g] || 0;

                            bestW = w;

                const grade = bestObj.grade;
                const isA = grade.includes('A');
                const borderColor = isA ? 'border-red-500 text-red-500' : 'border-orange-500 text-orange-500';
                const bgColor = isA ? 'bg-red-50' : 'bg-orange-50';
                return `<div class="${bgColor} ${borderColor} border text-[11px] sm:text-sm py-1.5 px-1 rounded-sm font-black mx-auto w-full text-center shadow-sm">${grade}</div>`;
            };

            const buildHorizontalTable = (title, imgSrc, chapters, subjectKeyFn) => {
                const formatChapterHtml = (ch) => {
                    if (ch.includes('會考模擬試題')) {
                        return `<div class="step3-color-exam font-black text-center w-full text-[11px] sm:text-xs leading-tight whitespace-pre-line flex items-center justify-center h-full">${ch.replace(' ', '\n')}</div>`;
                    }
                    
                    let line1 = '';
                    let line2 = '';
                    let line3 = '';
                    
                    // 智慧拆分章節字串
                    const parts = ch.split(' ');
                    if (parts.length >= 2 && parts[0].startsWith('單元')) {
                        line1 = parts[0];
                        line2 = parts[1];
                        line3 = parts.slice(2).join(' ');
                    } else if (parts.length >= 2 && parts[0].includes('會考模擬試題')) {
                        line1 = parts[0];
                        line2 = parts.slice(1).join(' ');
                    }
                    
                    // 根據是否有匹配到主標題來決定渲染三行或單行
                    if (line1) {
                        let html = '';
                        html += `<div class="text-[#DC143C] text-[12px] sm:text-[14px] font-black mb-0.5 leading-tight w-full text-center">${line1}</div>`;
                        html += `<div class="text-[#0066FF] text-[11px] sm:text-xs font-black mb-0.5 leading-tight w-full text-center">${line2}</div>`;
                        if (line3) {
                            html += `<div class="text-[10px] sm:text-[11px] text-gray-700 font-bold leading-tight whitespace-pre-line w-full text-center">${line3}</div>`;
                        }
                        return html;
                    } else {
                        return `<div class="text-[10px] sm:text-xs text-gray-700 font-bold leading-tight whitespace-pre-line w-full text-center flex items-center justify-center h-full">${ch}</div>`;
                    }
                };

                let tableHtml = `
                <div class="overflow-x-auto custom-scrollbar pb-3 relative">
                    <div class="inline-flex min-w-full border-2 border-gray-300 rounded-xl bg-white shadow-sm">
                        <div class="w-28 sm:w-36 flex flex-col items-center justify-center p-2 border-r-2 border-gray-300 bg-gray-50 shrink-0 sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] rounded-l-xl">

            const uGrades = allGrades[targetUser] || {};
            let weaknesses = [];
            
            Object.entries(uGrades).forEach(([dateStr, dayData]) => {
                Object.entries(dayData).forEach(([subKey, info]) => {
                    if (info.isWeakness) {
                        weaknesses.push({ date: dateStr, subSubject: subKey, ...info });
                    }
                });
            });

            const getSubjectOrder = (sub) => {
                const order = ['國文', '英文', '數學', '生物', '理化', '地球科學', '歷史', '地理', '公民', '自然合科', '社會合科'];
                const idx = order.indexOf(sub);
                return idx !== -1 ? idx : 999;
            };

            const getUnitOrder = (mainSub, subSub) => {
                if (TEXTBOOKS[mainSub]) {
                    for (let i = 0; i < TEXTBOOKS[mainSub].length; i++) {
                        const idx = TEXTBOOKS[mainSub][i].chapters.indexOf(subSub);
                        if (idx !== -1) return (i * 100) + idx;
                    }
                }
                if (SUB_SUBJECTS[mainSub]) {
                    const idx = SUB_SUBJECTS[mainSub].indexOf(subSub);
                    if (idx !== -1) return idx;
                }
                return 999;
            };

            // 先依科目名稱排序，再依單元順序排序
            weaknesses.sort((a, b) => {
                const subA = a.mainSubject || a.subSubject;
                const subB = b.mainSubject || b.subSubject;
                
                if (subA !== subB) {
                    const orderA = getSubjectOrder(subA);
                    const orderB = getSubjectOrder(subB);
                    if (orderA !== orderB) return orderA - orderB;
                    return subA.localeCompare(subB, 'zh-TW');
                }

                // 科目相同時，依單元順序
                const unitA = getUnitOrder(subA, a.subSubject);
                const unitB = getUnitOrder(subB, b.subSubject);
                
                if (unitA !== unitB) {
                    return unitA - unitB;
                }

                // 如果單元也一樣(例如重複紀錄)，則以時間新舊排(新的在上)
                return new Date(b.date) - new Date(a.date);
            });

            const analysisSubjects = ['國文', '英文', '數學', '生物', '理化', '地球科學', '歷史', '地理', '公民'];
            
            const gradeToNum = (g) => {
                const map = { 'A++': 7, 'A+': 6, 'A': 5, 'B++': 4, 'B+': 3, 'B': 2, 'C': 1 };
                return map[g] !== undefined ? map[g] : null;
            };

            const uGrades = allGrades[targetUser] || {};
            let subjectTotals = {};
            let subjectCounts = {};
            let subjectDetails = {};

            analysisSubjects.forEach(sub => {
                subjectTotals[sub] = 0;
                subjectCounts[sub] = 0;
                subjectDetails[sub] = { 'A++':0, 'A+':0, 'A':0, 'B++':0, 'B+':0, 'B':0, 'C':0 };
            });

            // 抓取各科目「所有」的成績資料並加總
            Object.keys(uGrades).forEach(dateStr => {

                    // 為了容納超長章節名稱，比對該紀錄的 mainSubject 是否為雷達圖的對象
                    const actualSub = analysisSubjects.includes(subKey) ? subKey : (analysisSubjects.includes(item.mainSubject) ? item.mainSubject : null);
                    
                    if (actualSub && analysisSubjects.includes(actualSub)) {
                        const grade = item.grade;
                        const num = gradeToNum(grade);
                        if (num !== null) {
                            subjectTotals[actualSub] += num;
                            subjectCounts[actualSub] += 1;
                            if(subjectDetails[actualSub][grade] !== undefined) {
                                subjectDetails[actualSub][grade]++;
                            }
                        }
                    }
                });

                                    const sub = context.chart.data.labels[context.dataIndex];
                                    return sub + '\n' + value + ' 分';
                                },
                                textAlign: 'center', align: 'end', anchor: 'end', offset: 5,

                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('prof-photo-upload').dataset.base64 = base64;
                    document.getElementById('prof-photo-preview').src = base64;
                    document.getElementById('prof-photo-preview').classList.remove('hidden');

                }
            }

            let updatedProfiles = JSON.parse(JSON.stringify(usersProfile));
            updatedProfiles[name] = {
                password: pwd,
                nickname: nickname,
                birthday: document.getElementById('prof-birthday').value,
                target: document.getElementById('prof-target').value,
                motto: document.getElementById('prof-motto').value,
                photo: document.getElementById('prof-photo-upload').dataset.base64 || '',
                color: assignedColor
            };

            try {
                if (isNewUser) {
                    const newUsers = [...globalUsers, name];
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList'), { users: newUsers }, { merge: true });
                }
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile'), { profiles: updatedProfiles }, { merge: true });
                
                closeGlobalModal('profile-edit-modal');
                
                if(username !== name) {
                    doCompleteLogin(name);
                } else {
                    alert("資料卡更新成功！");
                    window.renderMainContent(); 
                }
            } catch(e) {
                console.error(e);
                alert("儲存失敗！");
            }
        };

        const doCompleteLogin = (name) => {
            username = name;
            viewingUser = name; 
            isAdmin = (username === 'Nick'); 
            localStorage.setItem('study_group_user', username);
            setupListeners();
            window.renderMain();
        };

        window.openPublicProfile = (name) => {
            const prof = usersProfile[name] || {};
            document.getElementById('vp-nickname').innerText = prof.nickname || name;
            document.getElementById('vp-name').innerText = `@${name}`;
            document.getElementById('vp-target').innerText = prof.target || '未設定';
            document.getElementById('vp-motto').innerText = prof.motto ? `「${prof.motto}」` : '默默努力中...';
            document.getElementById('vp-birthday').innerText = prof.birthday ? `🎂 ${prof.birthday}` : '';

            const imgEl = document.getElementById('vp-photo');
            const fallbackEl = document.getElementById('vp-avatar-fallback');
            
            if(prof.photo) {
                imgEl.src = prof.photo;
                imgEl.style.display = 'block';
                fallbackEl.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                fallbackEl.innerText = getAvatarChar(name);
                fallbackEl.style.display = 'flex';
                fallbackEl.className = `w-24 h-24 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-3xl font-black mb-3 ${getUserColor(name)}`;
            }

            openGlobalModal('view-profile-modal');
        };

        // ==========================================
        //  管理員面板邏輯
        // ==========================================
        window.openAdminPanel = () => {
            renderAdminDates();
            renderAdminUsers();
            switchAdminTab('dates');
            openGlobalModal('admin-panel-modal');
        };

        window.switchAdminTab = (tab) => {
            if(tab === 'dates') {
                document.getElementById('admin-tab-dates').classList.remove('hidden');
                document.getElementById('admin-tab-users').classList.add('hidden');
                document.getElementById('tab-btn-dates').classList.replace('text-gray-500', 'text-amber-600');
                document.getElementById('tab-btn-dates').classList.replace('border-transparent', 'border-amber-500');
                document.getElementById('tab-btn-dates').classList.replace('hover:bg-gray-100', 'bg-white');
                document.getElementById('tab-btn-users').classList.replace('text-amber-600', 'text-gray-500');
                document.getElementById('tab-btn-users').classList.replace('border-amber-500', 'border-transparent');
                document.getElementById('tab-btn-users').classList.replace('bg-white', 'hover:bg-gray-100');
            } else {
                document.getElementById('admin-tab-dates').classList.add('hidden');
                document.getElementById('admin-tab-users').classList.remove('hidden');
                document.getElementById('tab-btn-users').classList.replace('text-gray-500', 'text-amber-600');
                document.getElementById('tab-btn-users').classList.replace('border-transparent', 'border-amber-500');
                document.getElementById('tab-btn-users').classList.replace('hover:bg-gray-100', 'bg-white');
                document.getElementById('tab-btn-dates').classList.replace('text-amber-600', 'text-gray-500');
                document.getElementById('tab-btn-dates').classList.replace('border-amber-500', 'border-transparent');
                document.getElementById('tab-btn-dates').classList.replace('bg-white', 'hover:bg-gray-100');
            }
        };

        window.renderAdminDates = () => {
            const container = document.getElementById('admin-dates-list');
            const sortedDates = [...importantDates].sort((a, b) => new Date(a.date) - new Date(b.date));
            container.innerHTML = sortedDates.map((item, index) => `
                <div class="bg-white p-3 rounded-lg border border-gray-200 flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold text-gray-800">${item.title}</div>
                        <div class="text-sm text-gray-500">${item.date}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="adminEditDate(${index})" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded font-bold text-sm hover:bg-blue-100">編輯</button>
                        <button onclick="adminDeleteDate(${index})" class="px-3 py-1.5 bg-red-50 text-red-600 rounded font-bold text-sm hover:bg-red-100">刪除</button>
                    </div>
                </div>
            `).join('');
        };

        window.adminAddDate = async () => {
            const title = document.getElementById('admin-new-date-title').value.trim();
            const date = document.getElementById('admin-new-date-value').value;
            if(!title || !date) return alert("請填寫完整");
            const newDates = [...importantDates, { title, date }];
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates'), { list: newDates });
            document.getElementById('admin-new-date-title').value = '';
            document.getElementById('admin-new-date-value').value = '';
        };

        window.adminEditDate = (index) => {
            const sortedDates = [...importantDates].sort((a, b) => new Date(a.date) - new Date(b.date));
            const item = sortedDates[index];
            const realIndex = importantDates.findIndex(d => d.title === item.title && d.date === item.date);
            document.getElementById('edit-date-index').value = realIndex;
            document.getElementById('edit-date-title').value = item.title;
            document.getElementById('edit-date-value').value = item.date;
            openGlobalModal('edit-date-modal');
        };

        window.saveEditedDate = async () => {
            const idx = parseInt(document.getElementById('edit-date-index').value);
            const title = document.getElementById('edit-date-title').value.trim();
            const date = document.getElementById('edit-date-value').value;
            if(!title || !date) return alert("不可留空");
            let newDates = [...importantDates];
            newDates[idx] = { title, date };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates'), { list: newDates });
            closeGlobalModal('edit-date-modal');
        };

        window.adminDeleteDate = async (index) => {
            if(!confirm("確定刪除此日程？")) return;
            const sortedDates = [...importantDates].sort((a, b) => new Date(a.date) - new Date(b.date));
            const item = sortedDates[index];
            const realIndex = importantDates.findIndex(d => d.title === item.title && d.date === item.date);
            
            const newDates = [...importantDates];
            newDates.splice(realIndex, 1);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates'), { list: newDates });
        };

        window.renderAdminUsers = () => {
            const tbody = document.getElementById('admin-users-list');
            tbody.innerHTML = globalUsers.map(u => {
                const prof = usersProfile[u] || {};
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 font-bold text-gray-800">${u}</td>
                        <td class="p-3 text-gray-600">${prof.nickname || '-'}</td>
                        <td class="p-3 font-mono text-gray-500">${prof.password || '<span class="text-red-400">未設定</span>'}</td>
                        <td class="p-3 text-right space-x-1">
                            <button onclick="openProfileEditModal('${u}')" class="px-2.5 py-1.5 bg-blue-50 text-blue-600 rounded font-bold text-xs hover:bg-blue-100">修改個資/密碼</button>
                            ${u === 'Nick' ? '' : `<button onclick="adminDeleteUser('${u}')" class="px-2.5 py-1.5 bg-red-50 text-red-600 rounded font-bold text-xs hover:bg-red-100">移除帳號</button>`}
                        </td>
                    </tr>
                `;
            }).join('');
        };

        window.adminDeleteUser = async (userToDelete) => {
            if(!confirm(`⚠️ 警告！確定要刪除帳號 [${userToDelete}] 嗎？此操作不可逆！`)) return;
            
            let transferTarget = null;
            const others = globalUsers.filter(u => u !== userToDelete);
            if (others.length > 0) {
                const ans = prompt(`是否轉移其成績給其他人？\n(若不轉移請留空按確定，將連帶刪除所有成績)\n可選對象: ${others.join(', ')}`);
                if (ans && others.includes(ans.trim())) {
                    transferTarget = ans.trim();
                } else if (ans) {
                    return alert("輸入的名稱無效，已取消刪除操作。");
                }
            }

            try {
                const newUsers = globalUsers.filter(u => u !== userToDelete);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList'), { users: newUsers });

                let newProfiles = JSON.parse(JSON.stringify(usersProfile));
                delete newProfiles[userToDelete];
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile'), { profiles: newProfiles });

                if (allGrades[userToDelete]) {
                    const dates = Object.keys(allGrades[userToDelete]);
                    for (let i = 0; i < dates.length; i++) {
                        const dateStr = dates[i];
                        const subs = Object.keys(allGrades[userToDelete][dateStr]);
                        for (let j = 0; j < subs.length; j++) {
                            const sub = subs[j];
                            const oldDocId = `${userToDelete}_${dateStr}_${sub}`;
                            const oldRef = doc(db, 'artifacts', appId, 'public', 'data', 'Grades', oldDocId);
                            
                            if (transferTarget) {
                                const newDocId = `${transferTarget}_${dateStr}_${sub}`;
                                const newRef = doc(db, 'artifacts', appId, 'public', 'data', 'Grades', newDocId);
                                const gradeData = allGrades[userToDelete][dateStr][sub];
                                await setDoc(newRef, {
                                    user: transferTarget,
                                    date: dateStr,
                                    mainSubject: gradeData.mainSubject || gradeData.subSubject || sub,
                                    subSubject: sub,
                                    grade: gradeData.grade,
                                    photo: gradeData.photo || null,
                                    updatedAt: gradeData.updatedAt || new Date().toISOString()
                                });
                            }
                            await deleteDoc(oldRef);
                        }
                    }
                }

                alert(`已成功移除使用者 ${userToDelete} ${transferTarget ? '，成績已轉移至 ' + transferTarget : '，成績已連帶刪除'}。`);
                renderAdminUsers();
            } catch(e) {
                console.error(e);
                alert("移除操作失敗！");
            }
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) window.renderMainContent();
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2026-09-09', title: '第1次模擬考' },
                        { date: '2026-10-13', title: '第1次段考' },
                        { date: '2026-10-28', title: '第2次模擬考' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) window.renderSidebar();
                if(isAdmin && !document.getElementById('admin-panel-modal').classList.contains('hidden')) window.renderAdminDates();
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) window.renderChat();
            }, errHandler);

            const gradesCol = collection(db, 'artifacts', appId, 'public', 'data', 'Grades');
            if(unsubGrades) unsubGrades();
            unsubGrades = onSnapshot(gradesCol, (snap) => {
                let newAllGrades = {};
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if(!data.user || !data.date || !data.subSubject) return; 
                    
                    if(!newAllGrades[data.user]) newAllGrades[data.user] = {};
                    if(!newAllGrades[data.user][data.date]) newAllGrades[data.user][data.date] = {};
                    
                    newAllGrades[data.user][data.date][data.subSubject] = {
                        mainSubject: data.mainSubject || '',
                        grade: data.grade,
                        photo: data.photo || null,
                        isWeakness: data.isWeakness || false,
                        weaknessNote: data.weaknessNote || '',
                        reviews: data.reviews || [false, false, false, false, false],
                        updatedAt: data.updatedAt || ''
                    };
                });
                allGrades = newAllGrades;
                if(username) window.renderMainContent();
            }, errHandler);
        };

        const initApp = async () => {
            window.renderApp();
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        initApp();

    </script>
</body>
</html>
